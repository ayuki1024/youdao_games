<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160" fill="none">
  <defs>
    <linearGradient id="mz-bg" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="mz-moon" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(180 32) rotate(90) scale(40)">
      <stop stop-color="#F9FAFB"/>
      <stop offset="1" stop-color="#E5E7EB"/>
    </radialGradient>
  </defs>

  <rect width="240" height="160" rx="12" fill="url(#mz-bg)"/>

  <!-- Moon -->
  <circle cx="182" cy="34" r="26" fill="url(#mz-moon)"/>
  <circle cx="190" cy="30" r="18" fill="#020617"/>

  <!-- Ground -->
  <rect x="0" y="104" width="240" height="56" fill="#022C22"/>
  <rect x="0" y="104" width="240" height="4" fill="#065F46" opacity="0.8"/>

  <!-- Base / house on the right -->
  <g transform="translate(172 72)">
    <rect x="-18" y="16" width="36" height="28" rx="3" fill="#374151"/>
    <polygon points="-22,16 0,-4 22,16" fill="#4B5563"/>
    <rect x="-8" y="24" width="16" height="12" fill="#FDE68A"/>
    <rect x="-4" y="38" width="8" height="10" fill="#111827"/>
  </g>

  <!-- Zombie head -->
  <g transform="translate(76 64)">
    <rect x="-22" y="-10" width="44" height="40" rx="10" fill="#6EE7B7" stroke="#064E3B" stroke-width="2"/>
    <!-- Scar -->
    <line x1="-16" y1="-4" x2="-4" y2="4" stroke="#065F46" stroke-width="2" stroke-linecap="round"/>
    <line x1="-10" y1="-2" x2="-12" y2="6" stroke="#065F46" stroke-width="2" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="-8" cy="4" r="5" fill="#F9FAFB"/>
    <circle cx="8" cy="4" r="5" fill="#F9FAFB"/>
    <circle cx="-8" cy="4" r="2" fill="#EF4444"/>
    <circle cx="8" cy="4" r="2" fill="#F97316"/>
    <!-- Mouth -->
    <rect x="-10" y="16" width="20" height="4" rx="2" fill="#111827"/>
    <rect x="-8" y="16" width="3" height="4" fill="#F9FAFB"/>
    <rect x="-1" y="16" width="3" height="4" fill="#F9FAFB"/>
    <rect x="6" y="16" width="3" height="4" fill="#F9FAFB"/>
  </g>

  <!-- Question card -->
  <g transform="translate(132 86)">
    <rect x="-42" y="-26" width="84" height="46" rx="8" fill="#0B1120" stroke="#22C55E" stroke-width="2"/>
    <text x="-34" y="-6" font-size="11" font-family="Consolas, monospace" fill="#E5E7EB">int x = 10;</text>
    <text x="-34" y="12" font-size="10" font-family="Consolas, monospace" fill="#A5B4FC">x % 3 = ?</text>
  </g>

  <!-- Choice pills -->
  <g transform="translate(40 124)">
    <rect x="0" y="0" width="40" height="16" rx="8" fill="#111827" stroke="#4ADE80" stroke-width="1.5"/>
    <text x="14" y="12" font-size="10" font-family="Arial, Helvetica, sans-serif" fill="#BBF7D0">1</text>

    <rect x="52" y="0" width="40" height="16" rx="8" fill="#16A34A"/>
    <text x="66" y="12" font-size="10" font-family="Arial, Helvetica, sans-serif" fill="#ECFDF5">2</text>

    <rect x="104" y="0" width="40" height="16" rx="8" fill="#111827" stroke="#4B5563" stroke-width="1.5"/>
    <text x="118" y="12" font-size="10" font-family="Arial, Helvetica, sans-serif" fill="#E5E7EB">3</text>
  </g>

  <text x="16" y="26" font-size="14" font-family="Arial, Helvetica, sans-serif" fill="#BBF7D0">
    C++ Zombie Quiz
  </text>
</svg>

