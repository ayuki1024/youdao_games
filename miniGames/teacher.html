<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大战老师</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #87ceeb; font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif; }
canvas { display: block; }
#gameContainer { position: relative; width: 100vw; height: 100vh; }

/* ── HUD ── */
#uiOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

#scoreBoard {
  position: absolute; top: 14px; left: 14px;
  background: rgba(255,255,255,0.82);
  border: 1px solid rgba(255,160,40,0.4);
  border-radius: 12px; padding: 10px 16px;
  color: #c05000; font-size: 15px;
  text-shadow: 0 1px 0 rgba(255,200,100,0.3);
  line-height: 2;
}
#waveInfo {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.82);
  border: 1px solid rgba(255,140,30,0.4);
  border-radius: 20px; padding: 6px 22px;
  color: #c05000; font-size: 15px; font-weight: bold;
}
#healthBar {
  position: absolute; top: 14px; right: 14px; width: 185px;
  background: rgba(255,255,255,0.82);
  border: 1px solid rgba(255,100,100,0.3);
  border-radius: 12px; padding: 9px 13px;
}
#healthBar .label { color: #d04040; font-size: 12px; margin-bottom: 4px; }
#healthBar .bar {
  width: 100%; height: 14px; background: rgba(255,220,220,0.8);
  border-radius: 7px; overflow: hidden; border: 1px solid #faa;
}
#healthBar .fill {
  height: 100%;
  background: linear-gradient(90deg, #f55, #f88, #ffb);
  border-radius: 7px; transition: width 0.4s ease;
}
#healthBar .fill.low { animation: hpPulse 0.55s infinite alternate; }
@keyframes hpPulse {
  from { box-shadow: 0 0 4px #f44; }
  to   { box-shadow: 0 0 18px #f44, 0 0 32px #f00; }
}

/* ── Combo ── */
#comboDisplay {
  position: absolute; top: 36%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  color: #ff5500; font-size: 54px; font-weight: 900;
  text-shadow: 0 0 20px #ff8800, 0 0 40px #ff6600;
  opacity: 0; pointer-events: none; white-space: nowrap; letter-spacing: 2px;
}
#comboDisplay.show { animation: comboPop 1.3s forwards; }
@keyframes comboPop {
  0%   { opacity:0;  transform:translate(-50%,-50%) scale(0.25) rotate(-6deg); }
  18%  { opacity:1;  transform:translate(-50%,-50%) scale(1.22)  rotate(2deg);  }
  30%  { transform:translate(-50%,-50%) scale(0.95) rotate(0); }
  50%  { opacity:1;  transform:translate(-50%,-50%) scale(1.04);  }
  75%  { opacity:1;  transform:translate(-50%,-50%) scale(1);     }
  100% { opacity:0;  transform:translate(-50%,-65%) scale(0.8);   }
}

/* ── Question Panel ── */
#questionPanel {
  position: absolute; bottom: -240px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.95);
  border: 1.5px solid rgba(255,160,40,0.55);
  border-radius: 18px; padding: 18px 28px 20px;
  min-width: 600px; max-width: 860px; width: 62vw;
  pointer-events: auto;
  box-shadow: 0 0 28px rgba(255,160,40,0.18), 0 8px 32px rgba(0,0,0,0.12);
  transition: bottom 0.52s cubic-bezier(0.22,1,0.36,1);
}
#questionPanel.visible { bottom: 100px; }
#questionText {
  color: #2c2c3a; font-size: 17px; margin-bottom: 12px;
  text-align: left; line-height: 1.6;
  white-space: pre-wrap;
}
#answerOptions { display: grid; grid-template-columns: 1fr; gap: 8px; }

.optionBtn {
  background: linear-gradient(145deg,#fffbf2,#fff4e0);
  color: #5c3200; border: 1.5px solid rgba(255,160,40,0.4);
  border-radius: 10px; padding: 10px 18px;
  font-size: 15px; cursor: pointer; text-align: left;
  transition: background .2s, border-color .2s, transform .15s, box-shadow .2s;
  position: relative; overflow: hidden;
}
.optionBtn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg,rgba(255,255,255,0.55) 0%,transparent 55%);
  pointer-events: none;
}
.optionBtn:hover:not(:disabled) {
  background: linear-gradient(145deg,#fff0cc,#ffe8a0);
  border-color: #ffa030;
  transform: translateY(-2px); box-shadow: 0 4px 18px rgba(255,160,40,0.28);
}
.optionBtn.correct {
  background: linear-gradient(145deg,#d4edda,#c3e6cb);
  border-color: #28a745; box-shadow: 0 0 18px rgba(40,167,69,0.3);
  animation: correctPulse .5s; color: #155724;
}
.optionBtn.wrong {
  background: linear-gradient(145deg,#f8d7da,#f5c6cb);
  border-color: #dc3545; box-shadow: 0 0 18px rgba(220,53,69,0.3);
  animation: wrongShake .5s; color: #721c24;
}
@keyframes correctPulse { 0%,100%{transform:scale(1)} 40%{transform:scale(1.07)} }
@keyframes wrongShake   { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 60%{transform:translateX(8px)} }
.keyHint {
  display:inline-block; background:rgba(0,0,0,0.07);
  border:1px solid rgba(0,0,0,0.14); border-radius:4px;
  padding:1px 5px; font-size:11px; margin-right:6px; color:#999; vertical-align:middle;
}

/* ── Wave Overlay ── */
#waveOverlay {
  position: absolute; inset: 0;
  background: rgba(255,240,200,0.88);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 80; pointer-events: none; opacity: 0;
}
#waveOverlay.show { animation: waveAnim 2.5s forwards; }
@keyframes waveAnim {
  0%  {opacity:0} 14%{opacity:1} 72%{opacity:1} 100%{opacity:0}
}
#waveBig {
  font-size: 86px; font-weight: 900; color: #e65c00;
  text-shadow: 0 0 40px #ff8800, 0 0 80px #ffaa00;
  letter-spacing: 8px;
  animation: waveBigAnim 2.5s forwards;
}
@keyframes waveBigAnim {
  0%  {transform:scale(0.3) rotate(-5deg);opacity:0}
  20% {transform:scale(1.12) rotate(1.5deg);opacity:1}
  35% {transform:scale(0.96);opacity:1}
  80% {transform:scale(1);opacity:1}
  100%{transform:scale(1.18);opacity:0}
}
#waveSub { font-size: 22px; color: #555; margin-top: 10px; letter-spacing: 4px; opacity:.9; }

/* ── Start Screen ── */
#startScreen {
  position: absolute; inset: 0;
  background: linear-gradient(180deg,#87ceeb 0%,#b8e8f8 45%,#c8f0a0 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: auto; z-index: 100;
}
#startScreen canvas { pointer-events: none; }
.gameTitle {
  font-size: 52px; font-weight: 900;
  color: transparent;
  background: linear-gradient(90deg, #ff6b6b, #ffa500 50%, #ff6b6b);
  -webkit-background-clip: text; background-clip: text;
  filter: drop-shadow(0 2px 8px rgba(255,120,0,0.45));
  margin-bottom: 8px; letter-spacing: 2px;
  animation: titlePulse 3s ease-in-out infinite;
}
@keyframes titlePulse {
  0%,100%{filter:drop-shadow(0 2px 8px rgba(255,120,0,0.45))}
  50%    {filter:drop-shadow(0 2px 22px rgba(255,150,0,0.9))}
}
.subLine { color: #555; font-size: 15px; margin: 5px 0 3px; letter-spacing: 1px; }
.ruleLine { color: #777; font-size: 13px; margin: 3px 0 14px; }
#difficultySelect { display: flex; gap: 10px; margin: 12px 0; }
.diffBtn {
  background: rgba(255,255,255,0.75); color: #c05000;
  border: 1.5px solid rgba(255,150,40,0.38);
  border-radius: 8px; padding: 8px 22px; cursor: pointer;
  font-size: 15px; transition: all .2s;
}
.diffBtn:hover,.diffBtn.active {
  background: linear-gradient(145deg,#fff0cc,#ffe0a0);
  border-color: #ffa030; color: #a03000;
  box-shadow: 0 0 14px rgba(255,160,40,0.35);
}
.startBtn {
  background: linear-gradient(145deg,#ff8c00,#ff6000);
  color: #fff; border: 1.5px solid #ffaa30;
  border-radius: 14px; padding: 14px 52px;
  font-size: 22px; cursor: pointer; transition: all .25s;
  margin-top: 18px; letter-spacing: 2px;
  box-shadow: 0 0 22px rgba(255,150,0,0.42);
}
.startBtn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 0 38px rgba(255,160,0,0.7); }

/* ── Avatar Upload ── */
.avatarUpload {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  margin: 14px 0 8px; padding: 12px 20px;
  background: rgba(255,255,255,0.45); border-radius: 12px;
  border: 1px dashed rgba(255,150,40,0.5);
}
.avatarLabel { cursor: pointer; color: #c05000; font-size: 14px; font-weight: bold; }
.avatarLabel:hover { color: #e03000; }
.avatarPreview {
  width: 56px; height: 56px; border-radius: 50%;
  overflow: hidden; background: rgba(255,220,150,0.4);
  border: 2.5px solid rgba(255,150,40,0.6);
}
.avatarPreview img { width: 100%; height: 100%; object-fit: cover; }
.avatarClear {
  background: transparent; color: #aaa; border: 1px solid rgba(200,100,50,0.3);
  border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer;
}
.avatarClear:hover { color: #c44; border-color: rgba(220,80,50,0.5); }

/* ── Game Over ── */
#gameOverScreen {
  position: absolute; inset: 0;
  background: linear-gradient(180deg,#fff5e0 0%,#ffe0b2 55%,#fff0cc 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: auto; z-index: 100;
}
.goTitle {
  font-size: 58px; font-weight: 900; color: #e65c00;
  text-shadow: 0 0 28px #ff8800, 0 2px 0 rgba(0,0,0,0.1);
  animation: goAppear .55s ease .25s both; letter-spacing: 3px;
}
@keyframes goAppear {
  0% {transform:scale(0.3) rotate(-6deg);opacity:0}
  65%{transform:scale(1.08) rotate(1deg);opacity:1}
  82%{transform:scale(0.96)}
  100%{transform:scale(1)}
}
.statsGrid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px 32px;
  margin: 22px 0 10px; padding: 20px 36px;
  background: rgba(255,255,255,0.55);
  border: 1px solid rgba(255,160,40,0.25);
  border-radius: 16px;
  animation: statsFade .5s ease .6s both;
}
@keyframes statsFade {
  from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:none}
}
.statItem { text-align: center; }
.statLabel { color: #999; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; }
.statVal { color: #e65c00; font-size: 34px; font-weight: 900; text-shadow: 0 0 12px rgba(255,150,0,0.4); }

/* ── Overlays ── */
#vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.12) 100%);
  pointer-events: none; z-index: 5;
}
#damageFlash {
  position: absolute; inset: 0; pointer-events: none; z-index: 10; opacity: 0;
  background: radial-gradient(ellipse at center, transparent 38%, rgba(255,100,0,0.35) 100%);
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="vignette"></div>
  <div id="damageFlash"></div>
  <div id="uiOverlay">
    <div id="scoreBoard">
      <div>🎯 分数 &nbsp;<span id="score">0</span></div>
      <div>🔥 连击 &nbsp;<span id="combo">0</span></div>
      <div>📚 击退 &nbsp;<span id="kills">0</span></div>
    </div>
    <div id="waveInfo">📖 第 <span id="waveNum">1</span> 节课</div>
    <div id="healthBar">
      <div class="label">🏫 教室生命值</div>
      <div class="bar"><div class="fill" id="healthFill"></div></div>
    </div>
    <div id="comboDisplay"></div>
    <div id="questionPanel">
      <div id="questionText">准备开始...</div>
      <div id="answerOptions"></div>
    </div>
  </div>

  <div id="waveOverlay">
    <div id="waveBig">WAVE 1</div>
    <div id="waveSub">准备好了吗？</div>
  </div>

  <!-- Start Screen -->
  <div id="startScreen">
    <canvas id="bgCanvas" style="position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:.3;pointer-events:none;"></canvas>
    <div style="position:relative;z-index:1;text-align:center;">
      <div class="gameTitle">👨‍🏫 大战老师 👨‍🏫</div>
      <div class="subLine">老师们来袭！用你的 C++ 知识打退他们！</div>
      <div class="ruleLine">✅ 答对 → 击退老师 &nbsp;|&nbsp; ❌ 答错 → 老师前进 &nbsp;|&nbsp; 键盘 1-4 快速作答</div>
      <div id="difficultySelect">
        <button class="diffBtn active" data-diff="easy">🌿 简单</button>
        <button class="diffBtn"        data-diff="normal">⚔️ 普通</button>
        <button class="diffBtn"        data-diff="hard">💀 困难</button>
      </div>
      <div class="avatarUpload">
        <label class="avatarLabel">
          <span>📷 上传老师头像（作为敌人面孔）</span>
          <input type="file" id="avatarInput" accept="image/*" hidden>
        </label>
        <div class="avatarPreview" id="avatarPreview"></div>
        <button type="button" class="avatarClear" id="avatarClear">清除头像</button>
      </div>
      <button class="startBtn" onclick="startGame()">⚔️ 开始战斗</button>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen" style="display:none;">
    <div class="goTitle">😭 教室被占领啦 😭</div>
    <div class="statsGrid">
      <div class="statItem"><div class="statLabel">最终分数</div><div class="statVal" id="finalScore">0</div></div>
      <div class="statItem"><div class="statLabel">击退老师</div><div class="statVal" id="finalKills">0</div></div>
      <div class="statItem"><div class="statLabel">最大连击</div><div class="statVal" id="finalCombo">0</div></div>
      <div class="statItem"><div class="statLabel">到达节数</div><div class="statVal" id="finalWave">1</div></div>
    </div>
    <button class="startBtn" onclick="restartGame()">🔄 再来一局</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  AUDIO ENGINE  (Web Audio API, no files)
// ═══════════════════════════════════════════
const audioCtx = (() => {
  try { return new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
})();

function unlockAudio() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
document.addEventListener('pointerdown', unlockAudio, { once: true });
document.addEventListener('keydown', unlockAudio, { once: true });

function tone(freq, type, dur, vol = 0.28, delay = 0) {
  if (!audioCtx) return;
  try {
    const t = audioCtx.currentTime + delay;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
  } catch(e) {}
}

function noise(dur, vol = 0.2, freqCenter = 300, delay = 0) {
  if (!audioCtx) return;
  try {
    const t = audioCtx.currentTime + delay;
    const len = audioCtx.sampleRate * dur;
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const g = audioCtx.createGain(); g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    const f = audioCtx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freqCenter;
    src.connect(f); f.connect(g); g.connect(audioCtx.destination);
    src.start(t); src.stop(t + dur);
  } catch(e) {}
}

const SFX = {
  correct() {
    tone(440,'sine',0.08,0.22); tone(660,'sine',0.14,0.22,0.08); tone(880,'sine',0.22,0.18,0.18);
  },
  wrong() {
    tone(200,'sawtooth',0.1,0.22); tone(160,'sawtooth',0.18,0.18,0.1);
  },
  explosion() { noise(0.28,0.45,200); tone(75,'sine',0.28,0.28); },
  shoot()     { tone(600,'square',0.04,0.1); tone(300,'square',0.06,0.08,0.03); },
  combo(n)    {
    const b = 400 + n * 50;
    tone(b,'sine',0.06,0.2); tone(b*1.5,'sine',0.12,0.2,0.07); tone(b*2,'sine',0.2,0.18,0.14);
  },
  wave()      { [262,330,392,524].forEach((f,i)=>tone(f,'sine',0.28,0.28,i*0.13)); },
  gameOver()  { [524,415,330,262,196].forEach((f,i)=>tone(f,'sawtooth',0.3,0.24,i*0.2)); },
  damage()    { noise(0.18,0.55,150); tone(110,'sine',0.22,0.28); },
};

// ═══════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
const PANEL_RESERVE = 330;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight - PANEL_RESERVE; }
resize();
window.addEventListener('resize', () => { resize(); adjustLayout(); initEnv(); });

// ═══════════════════════════════════════════
//  AVATAR (僵尸头顶显示)
// ═══════════════════════════════════════════
let avatarImage = null;
let avatarObjectURL = null;
document.getElementById('avatarInput').addEventListener('change', e => {
  const f = e.target.files?.[0];
  if (!f || !f.type.startsWith('image/')) return;
  if (avatarObjectURL) URL.revokeObjectURL(avatarObjectURL);
  avatarObjectURL = URL.createObjectURL(f);
  const img = new Image();
  img.onload = () => {
    avatarImage = img;
    const prev = document.getElementById('avatarPreview');
    prev.innerHTML = ''; const im = document.createElement('img'); im.src = img.src; prev.appendChild(im);
  };
  img.src = avatarObjectURL;
});
document.getElementById('avatarClear').addEventListener('click', () => {
  avatarImage = null;
  if (avatarObjectURL) { URL.revokeObjectURL(avatarObjectURL); avatarObjectURL = null; }
  document.getElementById('avatarInput').value = '';
  document.getElementById('avatarPreview').innerHTML = '';
});

// ═══════════════════════════════════════════
//  QUESTIONS
// ═══════════════════════════════════════════
const questions = [
  {
    q: '在下列代码的横线处填写（），可以使得输出是 "1248"：\n\n#include <iostream>\nusing namespace std;\n\nint main() {\n    for (int i = 1; i <= 8; __) // 在此处填入代码\n        cout << i;\n    return 0;\n}',
    options: ['i++', 'i *= 2', 'i += 2', 'i * 2'],
    answer: 1,
  },
  {
    q: 'for(int i = 1; i < 10; i += 3); 表示从 1 开始到 10 结束间隔为 3，相当于 1、4、7、10。',
    options: ['正确', '错误'],
    answer: 1,
  },
  {
    q: 'C++ 的循环语句 for (int i = 0; i < 10; i += 2) 表示 i 从 0 开始到 10 结束但不包含 10，间隔为 2。',
    options: ['正确', '错误'],
    answer: 0,
  },
  {
    q: 'for 语句的循环体至少会执行一次。',
    options: ['正确', '错误'],
    answer: 1,
  },
];

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
const diffSettings = {
  easy:   { spawnInterval:2200, zombieSpeed:0.55, healthLoss:16 },
  normal: { spawnInterval:1600, zombieSpeed:0.80, healthLoss:24 },
  hard:   { spawnInterval:1100, zombieSpeed:1.10, healthLoss:34 },
};

let gs = {
  score:0, combo:0, maxCombo:0, kills:0, health:50,
  zombies:[], bullets:[], explosions:[], particles:[], floatTexts:[],
  wave:1, zombiesInWave:0, zombiesSpawned:0,
  currentQuestion:null, answered:false, difficulty:'easy',
  running:false, gameOver:false, lastSpawnTime:0, spawnInterval:3000,
  stars:[], clouds:[], fireflies:[], lightning:null, lightningTimer:0,
  shakeAmount:0, waveTransition:false,
};

document.querySelectorAll('.diffBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diffBtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    gs.difficulty = btn.dataset.diff;
  });
});

function initEnv() {
  gs.stars = [];
  gs.clouds = Array.from({ length: 7 }, () => ({
    x: Math.random() * W, y: H * 0.05 + Math.random() * H * 0.28,
    r: 28 + Math.random() * 22, speed: 0.12 + Math.random() * 0.18,
  }));
  gs.fireflies = Array.from({ length: 14 }, () => ({
    x: Math.random() * W, y: H * 0.56 + Math.random() * H * 0.13,
    vx: (Math.random() - 0.5) * 0.8, vy: (Math.random() - 0.5) * 0.5,
    phase: Math.random() * Math.PI * 2,
  }));
}
initEnv();

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ═══════════════════════════════════════════
//  ZOMBIE CLASS
// ═══════════════════════════════════════════
class Zombie {
  constructor(wave) {
    this.x = -72;
    this.y = H * 0.57 + Math.random() * (H * 0.12);
    this.baseY = this.y;
    this.frame = 0; this.ft = 0;
    this.dead = false; this.dying = false; this.dyingT = 0;
    this.bobOff = Math.random() * Math.PI * 2;
    this.groanT = Math.random() * 4000;
    this.skinVar = Math.floor(Math.random() * 3);

    const diff = diffSettings[gs.difficulty];
    this.type = Math.random() < 0.2 + wave * 0.02 ? 'fast'
              : Math.random() < 0.12 + wave * 0.01 ? 'big' : 'normal';

    if (this.type === 'fast') {
      this.w = 36; this.h = 54; this.hp = 1; this.maxHp = 1;
      this.speed = diff.zombieSpeed * 1.65 * (0.85 + Math.random() * 0.3) * (1 + wave * 0.05);
    } else if (this.type === 'big') {
      this.w = 56; this.h = 76; this.hp = 3; this.maxHp = 3;
      this.speed = diff.zombieSpeed * 0.52 * (0.85 + Math.random() * 0.3) * (1 + wave * 0.05);
    } else {
      this.w = 44; this.h = 64; this.hp = 1; this.maxHp = 1;
      this.speed = diff.zombieSpeed * (0.85 + Math.random() * 0.3) * (1 + wave * 0.05);
    }
  }

  update(dt) {
    if (this.dying) { this.dyingT += dt; if (this.dyingT > 600) this.dead = true; return; }
    this.x += this.speed * dt * 0.06;
    this.y = this.baseY + Math.sin(Date.now() * 0.003 + this.bobOff) * 3;
    this.ft += dt;
    const fRate = this.type === 'fast' ? 120 : 200;
    if (this.ft > fRate) { this.frame = (this.frame + 1) % 4; this.ft = 0; }
    this.groanT -= dt;
    if (this.groanT < 0) {
      this.groanT = 3500 + Math.random() * 5000;
      if (gs.running) tone(75 + Math.random() * 35, 'sawtooth', 0.22, 0.055);
    }
    if (this.x > W - 98) {
      gs.health -= diffSettings[gs.difficulty].healthLoss;
      gs.shakeAmount = 14; SFX.damage(); flashDamage();
      this.dead = true;
      createExplosion(W - 82, this.y, '#f44', 52);
      spawnParticles(W - 82, this.y, 18, '#f44');
      spawnParticles(W - 82, this.y, 10, '#ff8');
      if (gs.health <= 0) { gs.health = 0; endGame(); }
      updateHealthBar();
    }
  }

  draw() {
    ctx.save();
    const alpha = this.dying ? Math.max(0, 1 - this.dyingT / 600) : 1;
    ctx.globalAlpha = alpha;
    const dx = this.x;
    const dy = this.y - (this.dying ? this.dyingT * 0.045 : 0);
    const hw = this.w / 2, hh = this.h / 2;
    const big = this.type === 'big', fast = this.type === 'fast';

    // Outfit colors: fast=sporty red, big=严肃深蓝, normal=white shirt
    const OUTFITS = [
      { shirt:'#f0f0f0', tie:'#e85555', pants:'#2a3a6a', shoe:'#2a2040' },
      { shirt:'#fff8e0', tie:'#3a8fdd', pants:'#1a2a50', shoe:'#1a1830' },
      { shirt:'#f0fff0', tie:'#44bb44', pants:'#2a4a2a', shoe:'#1a3020' },
    ];
    const oc = fast
      ? { shirt:'#ffe0e0', tie:'#ff4444', pants:'#8b0000', shoe:'#500000' }
      : big
      ? { shirt:'#dde8ff', tie:'#1155cc', pants:'#0d1b4a', shoe:'#080f2a' }
      : OUTFITS[this.skinVar];

    // Shadow
    ctx.save(); ctx.globalAlpha = alpha * 0.18;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(dx, this.baseY + hh * 0.5, hw * 1.1, 5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Legs (pants)
    const legS = Math.sin(this.frame * Math.PI / 2) * 9;
    ctx.strokeStyle = oc.pants; ctx.lineWidth = fast ? 5 : 7; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(dx - 7, dy + hh * 0.1); ctx.lineTo(dx - 9 + legS, dy + hh * 0.75); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(dx + 7, dy + hh * 0.1); ctx.lineTo(dx + 9 - legS, dy + hh * 0.75); ctx.stroke();
    // Shoes
    ctx.fillStyle = oc.shoe;
    ctx.beginPath(); ctx.ellipse(dx - 9 + legS, dy + hh * 0.76, 6, 3, 0.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(dx + 9 - legS, dy + hh * 0.76, 6, 3, -0.2, 0, Math.PI * 2); ctx.fill();

    // Shirt/Torso
    ctx.fillStyle = oc.shirt;
    rrect(dx - hw + 5, dy - hh + 13, this.w - 10, this.h * 0.52, 5); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
    rrect(dx - hw + 5, dy - hh + 13, this.w - 10, this.h * 0.52, 5); ctx.stroke();

    // Jacket/collar outline
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(dx - 4, dy - hh + 13); ctx.lineTo(dx, dy - hh + 22); ctx.lineTo(dx + 4, dy - hh + 13);
    ctx.stroke();

    // Tie
    ctx.fillStyle = oc.tie;
    ctx.beginPath();
    ctx.moveTo(dx - 3, dy - hh + 15); ctx.lineTo(dx + 3, dy - hh + 15);
    ctx.lineTo(dx + 5, dy - hh + 28); ctx.lineTo(dx, dy - hh + 33); ctx.lineTo(dx - 5, dy - hh + 28);
    ctx.closePath(); ctx.fill();

    // Arms (reaching forward with book)
    const armS = Math.sin(this.frame * Math.PI / 2) * 13;
    ctx.strokeStyle = oc.shirt; ctx.lineWidth = fast ? 4 : 6; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(dx - hw + 5, dy - hh + 20);
    ctx.quadraticCurveTo(dx + hw + 4, dy - hh + 10 + armS, dx + hw + 16, dy - hh + 5 + armS);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(dx - hw + 5, dy - hh + 28);
    ctx.quadraticCurveTo(dx + hw + 3, dy - hh + 26 - armS, dx + hw + 15, dy - hh + 22 - armS);
    ctx.stroke();
    // Book in hand
    const bkX = dx + hw + 16, bkY = dy - hh + 13 + armS;
    ctx.fillStyle = '#ff8c00'; rrect(bkX, bkY, 10, 13, 2); ctx.fill();
    ctx.strokeStyle = '#c04000'; ctx.lineWidth = 1; rrect(bkX, bkY, 10, 13, 2); ctx.stroke();
    ctx.strokeStyle = '#fff3'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(bkX + 5, bkY + 2); ctx.lineTo(bkX + 5, bkY + 11); ctx.stroke();

    // Head radius
    const hR = big ? 18 : (fast ? 12 : 15);
    const hcx = dx, hcy = dy - hh + 8;

    // Draw head: avatar if available, else cartoon teacher face
    if (avatarImage && avatarImage.complete && avatarImage.naturalWidth) {
      const aR = (hR + 1) * 2;
      ctx.save();
      ctx.beginPath(); ctx.arc(hcx, hcy, aR, 0, Math.PI * 2); ctx.clip();
      ctx.drawImage(avatarImage, hcx - aR, hcy - aR, aR * 2, aR * 2);
      ctx.restore();
      // Border ring
      ctx.strokeStyle = 'rgba(255,200,60,0.9)'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(hcx, hcy, aR, 0, Math.PI * 2); ctx.stroke();
    } else {
      // Default cartoon teacher face
      ctx.fillStyle = '#f5c5a0';
      ctx.beginPath(); ctx.arc(hcx, hcy, hR, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1; ctx.stroke();
      // Hair
      ctx.fillStyle = '#5a3a1a';
      ctx.beginPath(); ctx.ellipse(hcx, hcy - hR * 0.7, hR * 0.9, hR * 0.45, 0, Math.PI, Math.PI * 2); ctx.fill();
      // Glasses
      ctx.strokeStyle = '#333'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(hcx - hR * 0.35, hcy, hR * 0.28, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(hcx + hR * 0.35, hcy, hR * 0.28, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(hcx - hR * 0.07, hcy); ctx.lineTo(hcx + hR * 0.07, hcy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(hcx - hR * 0.63, hcy); ctx.lineTo(hcx - hR * 0.8, hcy - 2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(hcx + hR * 0.63, hcy); ctx.lineTo(hcx + hR * 0.8, hcy - 2); ctx.stroke();
      // Smile
      ctx.strokeStyle = '#a06040'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(hcx, hcy + hR * 0.2, hR * 0.3, 0.15, Math.PI - 0.15); ctx.stroke();
    }

    // HP bar (big type)
    if (this.maxHp > 1) {
      const bw = 44, bx = dx - bw / 2, by = dy - hh - hR - 12;
      ctx.fillStyle = 'rgba(255,220,220,0.8)'; rrect(bx, by, bw, 6, 3); ctx.fill();
      ctx.fillStyle = this.hp > this.maxHp / 2 ? '#f97316' : '#ef4444';
      rrect(bx, by, bw * (this.hp / this.maxHp), 6, 3); ctx.fill();
      ctx.strokeStyle = 'rgba(200,100,0,0.4)'; ctx.lineWidth = 1; rrect(bx, by, bw, 6, 3); ctx.stroke();
    }

    // Type badge
    if (big || fast) {
      const lbl = big ? '严' : '快';
      const lc = big ? '#1155cc' : '#dc2626';
      ctx.fillStyle = lc; ctx.font = `bold ${hR * 0.75}px Microsoft YaHei`; ctx.textAlign = 'center';
      ctx.fillText(lbl, hcx, hcy + hR * 0.35);
    }

    ctx.restore();
  }
}

// ═══════════════════════════════════════════
//  BULLET CLASS
// ═══════════════════════════════════════════
class Bullet {
  constructor(target) {
    this.x = W - 98; this.y = H * 0.57 - 32;
    this.target = target; this.dead = false;
    this.trail = []; this.hue = Math.random() * 60 + 25;
  }
  update(dt) {
    if (!this.target || this.target.dead) { this.dead = true; return; }
    const dx = this.target.x - this.x, dy = this.target.y - this.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 20) {
      this.target.hp--;
      if (this.target.hp <= 0) {
        this.target.dying = true; gs.kills++; SFX.explosion();
        const pts = Math.floor(10 * (1 + gs.combo * 0.5));
        gs.score += pts;
        createExplosion(this.target.x, this.target.y, '#4f8', 52);
        spawnParticles(this.target.x, this.target.y, 22, '#7aba7a');
        spawnParticles(this.target.x, this.target.y, 10, '#ff8');
        addFloat(this.target.x, this.target.y - 22, `+${pts}`, '#ff8');
      } else {
        createExplosion(this.target.x, this.target.y, '#ff0', 28);
        spawnParticles(this.target.x, this.target.y, 7, '#ff8');
      }
      this.dead = true; return;
    }
    this.trail.push({ x: this.x, y: this.y, l: 1 });
    this.x += (dx / dist) * 10 * dt * 0.1;
    this.y += (dy / dist) * 10 * dt * 0.1;
    for (const t of this.trail) t.l -= 0.085;
    this.trail = this.trail.filter(t => t.l > 0);
  }
  draw() {
    for (const t of this.trail) {
      ctx.fillStyle = `hsla(${this.hue},100%,65%,${t.l * 0.55})`;
      ctx.beginPath(); ctx.arc(t.x, t.y, 4.5 * t.l, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = `hsl(${this.hue},100%,78%)`;
    ctx.shadowColor = `hsl(${this.hue},100%,62%)`; ctx.shadowBlur = 22;
    ctx.beginPath(); ctx.arc(this.x, this.y, 7, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ═══════════════════════════════════════════
//  EFFECTS
// ═══════════════════════════════════════════
function createExplosion(x, y, color, maxR = 42) {
  gs.explosions.push({ x, y, color, r: 5, maxR, l: 1 });
}
function spawnParticles(x, y, n, color) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, sp = Math.random() * 4 + 1;
    gs.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2.5, l: 1, color, sz: Math.random() * 5 + 2 });
  }
}
function addFloat(x, y, text, color) {
  gs.floatTexts.push({ x, y, vy: -1.6, text, color, l: 1 });
}

let damageFlashT = 0;
function flashDamage() { damageFlashT = 320; }

// ═══════════════════════════════════════════
//  BACKGROUND
// ═══════════════════════════════════════════
function drawBg(ts) {
  const groundY = H * 0.72;

  // Sky (bright blue)
  const sky = ctx.createLinearGradient(0, 0, 0, groundY);
  sky.addColorStop(0, '#4db8f0'); sky.addColorStop(0.55, '#87ceeb'); sky.addColorStop(1, '#c8e8ff');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, groundY);

  // Sun
  ctx.save();
  ctx.shadowColor = '#ffe040'; ctx.shadowBlur = 55;
  ctx.fillStyle = '#ffe040';
  ctx.beginPath(); ctx.arc(W * 0.12, H * 0.12, 36, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,220,60,0.45)'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 + ts * 0.0004;
    ctx.beginPath();
    ctx.moveTo(W * 0.12 + Math.cos(a) * 44, H * 0.12 + Math.sin(a) * 44);
    ctx.lineTo(W * 0.12 + Math.cos(a) * 60, H * 0.12 + Math.sin(a) * 60);
    ctx.stroke();
  }
  ctx.restore();

  // Clouds
  for (const c of gs.clouds) {
    c.x += c.speed; if (c.x > W + 200) c.x = -200;
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(c.x + c.r * 0.75, c.y + 6, c.r * 0.72, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(c.x - c.r * 0.72, c.y + 7, c.r * 0.65, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Ground (bright green)
  const gGrd = ctx.createLinearGradient(0, groundY, 0, H);
  gGrd.addColorStop(0, '#5cb85c'); gGrd.addColorStop(0.3, '#4cae4c'); gGrd.addColorStop(1, '#357a35');
  ctx.fillStyle = gGrd; ctx.fillRect(0, groundY, W, H - groundY);
  ctx.strokeStyle = 'rgba(80,180,60,0.8)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();

  // Grass tufts
  ctx.lineWidth = 1.4; ctx.lineCap = 'round';
  for (let gx = 18; gx < W; gx += 26 + Math.abs(Math.sin(gx * 0.5)) * 12) {
    const gh = 5 + Math.abs(Math.sin(gx * 0.28)) * 6;
    ctx.strokeStyle = Math.sin(gx * 1.3) > 0 ? '#6ac96a' : '#4cae4c';
    ctx.beginPath(); ctx.moveTo(gx, groundY); ctx.quadraticCurveTo(gx - 4, groundY - gh, gx - 1, groundY - gh - 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx + 5, groundY); ctx.quadraticCurveTo(gx + 9, groundY - gh * 0.75, gx + 8, groundY - gh - 1); ctx.stroke();
  }

  // Scenery
  drawTree(W * 0.10, groundY, 0.82);
  drawTree(W * 0.28, groundY, 0.62);
  drawTree(W * 0.48, groundY, 1.02);
  drawTree(W * 0.66, groundY, 0.56);
  drawFlower(W * 0.17, groundY, 0.9);
  drawFlower(W * 0.38, groundY, 0.7);
  drawFlower(W * 0.57, groundY, 1.1);
  drawBase(W - 88, groundY);

  // Butterflies
  for (const f of gs.fireflies) {
    f.x += f.vx; f.y += f.vy; f.phase += 0.09;
    if (f.x < 0) f.x = W; if (f.x > W) f.x = 0;
    if (f.y < groundY - 70) f.vy += 0.06; if (f.y > groundY - 8) f.vy -= 0.06;
    const fa = 0.7 + Math.sin(f.phase) * 0.25;
    const wing = Math.abs(Math.sin(f.phase * 3.5)) * 9;
    const colors = ['rgba(255,180,50,', 'rgba(255,100,180,', 'rgba(100,180,255,'];
    const bc = colors[Math.floor(f.phase * 0.3) % colors.length];
    ctx.fillStyle = `${bc}${fa})`;
    ctx.beginPath(); ctx.ellipse(f.x - wing, f.y, 5, 3, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(f.x + wing, f.y, 5, 3, 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(80,40,10,${fa * 0.8})`;
    ctx.beginPath(); ctx.arc(f.x, f.y, 1.5, 0, Math.PI * 2); ctx.fill();
  }
}

function drawLightning(x1, y1, x2, y2, n) {
  if (n <= 0) return;
  ctx.save();
  ctx.strokeStyle = `rgba(170,200,255,${0.55 + Math.random() * 0.45})`;
  ctx.lineWidth = n * 0.85; ctx.shadowColor = '#88f'; ctx.shadowBlur = 22;
  const mx = (x1 + x2) / 2 + (Math.random() - 0.5) * 55;
  const my = (y1 + y2) / 2;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(mx, my); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.restore();
  if (n > 2 && Math.random() < 0.5)
    drawLightning(mx, my, mx + (Math.random() - 0.5) * 90, y2 * 0.72, n - 2);
}

function drawTree(x, groundY, scale) {
  ctx.save(); ctx.translate(x, groundY); ctx.scale(scale, scale);
  const sw = Math.sin(Date.now() * 0.0006 + x) * 2;
  // Trunk
  ctx.strokeStyle = '#7a5530'; ctx.lineWidth = 7; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(sw, -55); ctx.stroke();
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(sw, -38); ctx.lineTo(sw + 15, -58); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sw, -28); ctx.lineTo(sw - 12, -50); ctx.stroke();
  // Foliage
  ctx.shadowColor = 'rgba(60,140,60,0.4)'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#4cae4c';
  ctx.beginPath(); ctx.arc(sw, -70, 26, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#5cb85c';
  ctx.beginPath(); ctx.arc(sw + 16, -57, 19, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(sw - 14, -60, 18, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#6ac96a';
  ctx.beginPath(); ctx.arc(sw + 4, -80, 15, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawFlower(x, groundY, scale) {
  ctx.save(); ctx.translate(x, groundY); ctx.scale(scale, scale);
  const sway = Math.sin(Date.now() * 0.0008 + x) * 2;
  // Stem
  ctx.strokeStyle = '#3d9140'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.bezierCurveTo(sway - 3, -14, sway + 3, -26, sway, -40); ctx.stroke();
  // Leaves
  ctx.fillStyle = '#4cae4c';
  ctx.beginPath(); ctx.ellipse(sway - 9, -20, 9, 4, -0.7, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sway + 9, -28, 9, 4, 0.7, 0, Math.PI * 2); ctx.fill();
  // Petals
  const PETAL_COLORS = [['#ff6b9d','#ff8fb0'],['#ffb347','#ffc870'],['#ff6b6b','#ff9090'],['#c084fc','#d8b4fe'],['#34d399','#6ee7b7']];
  const pc = PETAL_COLORS[Math.floor(Math.abs(Math.sin(x * 0.31)) * PETAL_COLORS.length)];
  for (let p = 0; p < 5; p++) {
    const a = (p / 5) * Math.PI * 2;
    ctx.fillStyle = pc[0];
    ctx.beginPath(); ctx.ellipse(sway + Math.cos(a) * 8, -40 + Math.sin(a) * 8, 6, 3.5, a, 0, Math.PI * 2); ctx.fill();
  }
  ctx.fillStyle = '#ffe040';
  ctx.beginPath(); ctx.arc(sway, -40, 5.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawBase(x, groundY) {
  // Walls (bright cream/yellow school building)
  ctx.fillStyle = '#fef9c3'; ctx.strokeStyle = '#e6d040'; ctx.lineWidth = 1.5;
  rrect(x - 40, groundY - 74, 80, 74, 4); ctx.fill(); ctx.stroke();
  ctx.strokeStyle = 'rgba(200,180,40,0.2)'; ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) { ctx.beginPath(); ctx.moveTo(x - 40, groundY - 74 + i * 15); ctx.lineTo(x + 40, groundY - 74 + i * 15); ctx.stroke(); }

  // Roof (warm orange)
  const rf = ctx.createLinearGradient(x - 52, groundY - 74, x, groundY - 112);
  rf.addColorStop(0, '#e65c00'); rf.addColorStop(1, '#ff8c00');
  ctx.fillStyle = rf;
  ctx.beginPath(); ctx.moveTo(x - 54, groundY - 74); ctx.lineTo(x, groundY - 114); ctx.lineTo(x + 54, groundY - 74); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#c04000'; ctx.lineWidth = 2; ctx.stroke();

  // Flag pole + flag
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x, groundY - 114); ctx.lineTo(x, groundY - 140); ctx.stroke();
  ctx.fillStyle = '#ff4444';
  ctx.beginPath(); ctx.moveTo(x, groundY - 140); ctx.lineTo(x + 18, groundY - 133); ctx.lineTo(x, groundY - 126); ctx.closePath(); ctx.fill();

  // Windows (bright blue sky-reflected)
  const wg = 0.55 + Math.sin(Date.now() * 0.002) * 0.08;
  ctx.fillStyle = `rgba(100,200,255,${wg})`; ctx.shadowColor = '#88eeff'; ctx.shadowBlur = 14;
  rrect(x - 28, groundY - 62, 20, 17, 3); ctx.fill();
  rrect(x + 8,  groundY - 62, 20, 17, 3); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(0,80,160,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - 18, groundY - 62); ctx.lineTo(x - 18, groundY - 45);
  ctx.moveTo(x - 28, groundY - 53); ctx.lineTo(x - 8, groundY - 53);
  ctx.moveTo(x + 18, groundY - 62); ctx.lineTo(x + 18, groundY - 45);
  ctx.moveTo(x + 8, groundY - 53);  ctx.lineTo(x + 28, groundY - 53);
  ctx.stroke();

  // Door (bright)
  ctx.fillStyle = '#7c3aed'; rrect(x - 11, groundY - 34, 22, 34, 3); ctx.fill();
  ctx.fillStyle = '#c4b5fd'; ctx.beginPath(); ctx.arc(x + 8, groundY - 17, 2, 0, Math.PI * 2); ctx.fill();

  // "教室" sign above door
  ctx.fillStyle = '#ff8c00'; ctx.font = 'bold 9px Microsoft YaHei'; ctx.textAlign = 'center';
  ctx.fillText('教室', x, groundY - 38);

  // Shield aura (warm golden)
  const sa = 0.07 + Math.sin(Date.now() * 0.004) * 0.04;
  const sg = ctx.createRadialGradient(x, groundY - 42, 10, x, groundY - 42, 66);
  sg.addColorStop(0, 'rgba(255,200,50,0)');
  sg.addColorStop(0.7, `rgba(255,200,50,${sa})`);
  sg.addColorStop(1, 'rgba(255,200,50,0)');
  ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(x, groundY - 42, 66, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = `rgba(255,200,50,${sa * 2.5})`; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x, groundY - 42, 68, 0, Math.PI * 2); ctx.stroke();
}

// ═══════════════════════════════════════════
//  QUESTION UI
// ═══════════════════════════════════════════
function getNextQuestion() {
  const q = questions[Math.floor(Math.random() * questions.length)];
  // 判断题（只有2个选项且为正确/错误）不打乱顺序
  const isTrueFalse = q.options.length === 2 &&
    q.options[0] === '正确' && q.options[1] === '错误';
  if (isTrueFalse) {
    return { q: q.q, options: ['正确', '错误'], answer: q.answer };
  }
  const idx = [0, 1, 2, 3];
  for (let i = 3; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [idx[i], idx[j]] = [idx[j], idx[i]]; }
  return { q: q.q, options: idx.map(i => q.options[i]), answer: idx.indexOf(q.answer) };
}

function showQuestion() {
  gs.currentQuestion = getNextQuestion();
  gs.answered = false;
  document.getElementById('questionText').textContent = '❓ ' + gs.currentQuestion.q;
  const optDiv = document.getElementById('answerOptions');
  optDiv.innerHTML = '';
  const keys = ['1','2','3','4'];
  const opts = (gs.currentQuestion.options || []).filter(o => o !== undefined && o !== null && o !== '');
  opts.forEach((opt, i) => {
    const k = keys[i] || '';
    const btn = document.createElement('button');
    btn.className = 'optionBtn';
    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    btn.innerHTML = (k ? `<span class="keyHint">${k}</span>` : '') + esc(opt);
    btn.addEventListener('click', () => handleAnswer(i, btn));
    optDiv.appendChild(btn);
  });
  document.getElementById('questionPanel').classList.add('visible');
}

function handleAnswer(index, btn) {
  if (gs.answered || gs.gameOver || !gs.running) return;
  gs.answered = true;
  unlockAudio();
  const correct = index === gs.currentQuestion.answer;
  const btns = document.querySelectorAll('.optionBtn');
  btns.forEach(b => b.disabled = true);

  if (correct) {
    btn.classList.add('correct');
    SFX.correct();
    gs.combo++;
    if (gs.combo > gs.maxCombo) gs.maxCombo = gs.combo;
    // Shoot frontmost zombie
    let front = null, maxX = -1;
    for (const z of gs.zombies) { if (!z.dying && !z.dead && z.x > maxX) { maxX = z.x; front = z; } }
    if (front) { gs.bullets.push(new Bullet(front)); SFX.shoot(); }
    // Combo display
    if (gs.combo >= 3) {
      SFX.combo(gs.combo);
      const cd = document.getElementById('comboDisplay');
      cd.textContent = gs.combo >= 10 ? `💥 ${gs.combo} 连击！！` : `🔥 ${gs.combo} 连击！`;
      cd.classList.remove('show'); void cd.offsetWidth; cd.classList.add('show');
    }
    // Heal on 5-combo
    if (gs.combo % 5 === 0) {
      gs.health = Math.min(50, gs.health + 3); updateHealthBar();
      addFloat(W - 90, H * 0.57 - 55, '+3 HP', '#4f8');
    }
  } else {
    btn.classList.add('wrong');
    btns[gs.currentQuestion.answer].classList.add('correct');
    SFX.wrong();
    gs.combo = 0;
    for (const z of gs.zombies) { if (!z.dying && !z.dead) z.x += 52; }
    gs.shakeAmount = 9; flashDamage();
  }
  updateUI();
  setTimeout(() => { if (gs.running) showQuestion(); }, 1300);
}

function updateUI() {
  document.getElementById('score').textContent = Math.floor(gs.score);
  document.getElementById('combo').textContent = gs.combo;
  document.getElementById('kills').textContent = gs.kills;
  document.getElementById('waveNum').textContent = gs.wave;
}
function updateHealthBar() {
  const fill = document.getElementById('healthFill');
  fill.style.width = gs.health + '%';
  fill.classList.toggle('low', gs.health <= 12);
}

// ═══════════════════════════════════════════
//  WAVE TRANSITION
// ═══════════════════════════════════════════
function showWaveTransition(num) {
  gs.waveTransition = true;
  const ov = document.getElementById('waveOverlay');
  document.getElementById('waveBig').textContent = `WAVE ${num}`;
  document.getElementById('waveSub').textContent =
    num === 1 ? '老师来啦，准备好了吗？' : num <= 3 ? '加油！继续答题！' : num <= 6 ? '资深教师来袭！' : '主任老师出动了！！';
  ov.classList.remove('show'); void ov.offsetWidth; ov.classList.add('show');
  SFX.wave();
  setTimeout(() => { gs.waveTransition = false; }, 2500);
}

function checkWave() {
  if (gs.waveTransition) return;
  if (gs.zombiesSpawned >= gs.zombiesInWave && gs.zombies.every(z => z.dead)) {
    gs.wave++;
    gs.zombiesInWave = 3 + gs.wave * 2;
    gs.zombiesSpawned = 0;
    gs.spawnInterval = Math.max(700, diffSettings[gs.difficulty].spawnInterval - gs.wave * 80);
    gs.score += gs.wave * 60;
    updateUI();
    showWaveTransition(gs.wave);
  }
}

// ═══════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════
let lastTime = 0;
function gameLoop(ts) {
  if (!gs.running) return;
  const dt = Math.min(ts - lastTime, 100);
  lastTime = ts;

  ctx.save();
  if (gs.shakeAmount > 0) {
    ctx.translate((Math.random() - 0.5) * gs.shakeAmount, (Math.random() - 0.5) * gs.shakeAmount);
    gs.shakeAmount *= 0.84;
    if (gs.shakeAmount < 0.4) gs.shakeAmount = 0;
  }

  drawBg(ts);

  // Remaining count
  const rem = gs.zombiesInWave - gs.zombiesSpawned;
  if (rem > 0 && !gs.waveTransition) {
    ctx.fillStyle = 'rgba(180,60,0,0.75)'; ctx.font = '13px Microsoft YaHei'; ctx.textAlign = 'left';
    ctx.fillText(`⌛ 还有 ${rem} 位老师将要到来`, 12, H * 0.72 - 14);
  }

  // Spawn
  if (!gs.waveTransition && ts - gs.lastSpawnTime > gs.spawnInterval && gs.zombiesSpawned < gs.zombiesInWave) {
    gs.zombies.push(new Zombie(gs.wave));
    gs.zombiesSpawned++;
    gs.lastSpawnTime = ts;
  }

  // Zombies
  for (const z of gs.zombies) { z.update(dt); z.draw(); }
  gs.zombies = gs.zombies.filter(z => !z.dead);

  // Bullets
  for (const b of gs.bullets) { b.update(dt); b.draw(); }
  gs.bullets = gs.bullets.filter(b => !b.dead);

  // Explosions
  for (const e of gs.explosions) {
    e.r += 2.6; e.l -= 0.058;
    ctx.globalAlpha = e.l; ctx.strokeStyle = e.color; ctx.lineWidth = 3;
    ctx.shadowColor = e.color; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = e.l * 0.22; ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * 0.42, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }
  gs.explosions = gs.explosions.filter(e => e.l > 0);

  // Particles
  for (const p of gs.particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.13; p.l -= 0.023;
    ctx.globalAlpha = p.l; ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz);
    ctx.globalAlpha = 1;
  }
  gs.particles = gs.particles.filter(p => p.l > 0);

  // Float texts
  ctx.textAlign = 'center';
  for (const t of gs.floatTexts) {
    t.y += t.vy; t.l -= 0.018;
    ctx.globalAlpha = t.l; ctx.fillStyle = t.color;
    ctx.font = 'bold 22px Microsoft YaHei';
    ctx.shadowColor = t.color; ctx.shadowBlur = 10;
    ctx.fillText(t.text, t.x, t.y); ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
  gs.floatTexts = gs.floatTexts.filter(t => t.l > 0);

  ctx.restore();

  // Damage flash
  if (damageFlashT > 0) {
    damageFlashT -= dt;
    document.getElementById('damageFlash').style.opacity = Math.min(1, damageFlashT / 140);
  } else {
    document.getElementById('damageFlash').style.opacity = 0;
  }

  // Low HP pulse
  if (gs.health < 15) {
    const a = (0.08 + Math.sin(Date.now() * 0.006) * 0.06) * (1 - gs.health / 15);
    ctx.fillStyle = `rgba(255,0,0,${a})`; ctx.fillRect(0, 0, W, H);
  }

  checkWave();
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════
//  CONTROL
// ═══════════════════════════════════════════
function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameOverScreen').style.display = 'none';
  const diff = diffSettings[gs.difficulty];
  const prevClouds = gs.clouds, prevFF = gs.fireflies, prevDiff = gs.difficulty;
  gs = {
    score:0, combo:0, maxCombo:0, kills:0, health:50,
    zombies:[], bullets:[], explosions:[], particles:[], floatTexts:[],
    wave:1, zombiesInWave:5, zombiesSpawned:0,
    currentQuestion:null, answered:false, difficulty:prevDiff,
    running:true, gameOver:false, lastSpawnTime:0,
    spawnInterval:diff.spawnInterval,
    stars:[], clouds:prevClouds, fireflies:prevFF, lightning:null, lightningTimer:0,
    shakeAmount:0, waveTransition:false,
  };
  updateUI(); updateHealthBar();
  document.getElementById('questionPanel').classList.add('visible');
  showWaveTransition(1);
  showQuestion();
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}
function restartGame() { startGame(); }
function endGame() {
  if (gs.gameOver) return;
  gs.running = false; gs.gameOver = true;
  SFX.gameOver();
  document.getElementById('questionPanel').classList.remove('visible');
  document.getElementById('finalScore').textContent = Math.floor(gs.score);
  document.getElementById('finalKills').textContent = gs.kills;
  document.getElementById('finalCombo').textContent = gs.maxCombo;
  document.getElementById('finalWave').textContent = gs.wave;
  setTimeout(() => { document.getElementById('gameOverScreen').style.display = 'flex'; }, 650);
}

// ═══════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (gs.gameOver || !gs.running) return;
  const k = parseInt(e.key);
  if (k >= 1 && k <= 4) {
    const btns = document.querySelectorAll('.optionBtn');
    if (btns[k - 1] && !gs.answered) btns[k - 1].click();
  }
});

// ═══════════════════════════════════════════
//  LAYOUT
// ═══════════════════════════════════════════
function adjustLayout() {
  const p = document.getElementById('questionPanel');
  if (W < 600) {
    p.style.minWidth = '94%';
    p.style.width = '94%';
    document.getElementById('questionText').style.fontSize = '14px';
  } else {
    p.style.minWidth = '600px';
    p.style.width = '62vw';
    document.getElementById('questionText').style.fontSize = '17px';
  }
  document.getElementById('answerOptions').style.gridTemplateColumns = '1fr';
}
adjustLayout();

// ═══════════════════════════════════════════
//  START SCREEN BG ANIMATION
// ═══════════════════════════════════════════
(function () {
  const bgC = document.getElementById('bgCanvas');
  if (!bgC) return;
  const bc = bgC.getContext('2d');
  bgC.width = window.innerWidth; bgC.height = window.innerHeight;
  const SHIRT_COLORS = ['rgba(240,240,240,', 'rgba(255,248,224,', 'rgba(224,240,255,'];
  const TIE_COLORS   = ['rgba(232,85,85,',   'rgba(58,143,221,',  'rgba(68,187,68,'];
  const dummies = Array.from({ length: 7 }, () => ({
    x: Math.random() * bgC.width, y: bgC.height * 0.74 + Math.random() * 28,
    speed: 0.3 + Math.random() * 0.4, frame: 0, ft: 0,
    si: Math.floor(Math.random() * 3),
  }));
  function anim() {
    bc.clearRect(0, 0, bgC.width, bgC.height);
    for (const d of dummies) {
      d.x += d.speed; if (d.x > bgC.width + 70) d.x = -70;
      d.ft += 16; if (d.ft > 220) { d.frame = (d.frame + 1) % 4; d.ft = 0; }
      const ls = Math.sin(d.frame * Math.PI / 2) * 5;
      const sc = SHIRT_COLORS[d.si], tc = TIE_COLORS[d.si];
      // Legs
      bc.strokeStyle = 'rgba(30,50,120,0.6)'; bc.lineWidth = 5; bc.lineCap = 'round';
      bc.beginPath(); bc.moveTo(d.x - 5, d.y - 12); bc.lineTo(d.x - 6 + ls, d.y + 5); bc.stroke();
      bc.beginPath(); bc.moveTo(d.x + 5, d.y - 12); bc.lineTo(d.x + 6 - ls, d.y + 5); bc.stroke();
      // Body/shirt
      bc.fillStyle = `${sc}0.72)`;
      bc.fillRect(d.x - 10, d.y - 38, 20, 27);
      // Tie
      bc.fillStyle = `${tc}0.8)`;
      bc.beginPath(); bc.moveTo(d.x - 2, d.y - 37); bc.lineTo(d.x + 2, d.y - 37);
      bc.lineTo(d.x + 4, d.y - 26); bc.lineTo(d.x, d.y - 21); bc.lineTo(d.x - 4, d.y - 26); bc.closePath(); bc.fill();
      // Head
      bc.fillStyle = 'rgba(245,197,160,0.75)';
      bc.beginPath(); bc.arc(d.x, d.y - 50, 12, 0, Math.PI * 2); bc.fill();
      // Glasses
      bc.strokeStyle = 'rgba(50,50,50,0.5)'; bc.lineWidth = 1;
      bc.beginPath(); bc.arc(d.x - 4, d.y - 51, 3.5, 0, Math.PI * 2); bc.stroke();
      bc.beginPath(); bc.arc(d.x + 4, d.y - 51, 3.5, 0, Math.PI * 2); bc.stroke();
      bc.beginPath(); bc.moveTo(d.x - 0.5, d.y - 51); bc.lineTo(d.x + 0.5, d.y - 51); bc.stroke();
      // Book
      bc.fillStyle = 'rgba(255,140,0,0.75)';
      bc.fillRect(d.x + 10, d.y - 35, 8, 11);
    }
    if (document.getElementById('startScreen').style.display !== 'none') requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);
})();
</script>
