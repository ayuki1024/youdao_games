<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>擂台争霸 — 找出最强王者</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', sans-serif;
      background: #07071a;
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── STARS ── */
    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; border-radius: 50%; background: #fff;
      animation: tw var(--d) var(--dd) infinite alternate;
    }
    @keyframes tw { from { opacity: .1; } to { opacity: 1; } }

    /* ── LAYOUT ── */
    .wrap {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 16px 20px;
    }

    /* ── HEADER ── */
    h1 {
      text-align: center;
      font-size: clamp(2em, 5vw, 3em);
      font-weight: 900;
      background: linear-gradient(90deg, #ffd700 0%, #ff6b35 50%, #ffd700 100%);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 3s linear infinite;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }
    @keyframes shine { to { background-position: 200%; } }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,.5);
      font-size: .9em;
      margin-bottom: 14px;
    }

    /* ── STATS BAR ── */
    .stats {
      display: flex; justify-content: center; flex-wrap: wrap; gap: 12px 22px;
      background: rgba(255,215,0,.06);
      border: 1px solid rgba(255,215,0,.2);
      border-radius: 50px; padding: 8px 22px;
      margin-bottom: 18px; font-size: .88em;
    }
    .stat { display: flex; align-items: center; gap: 6px; }
    .stat-lbl { color: rgba(255,255,255,.5); }
    .stat-val { color: #ffd700; font-weight: 700; font-size: 1.1em; min-width: 28px; }

    /* ── GAME GRID ── */
    .game { display: flex; gap: 18px; align-items: flex-start; }

    /* ── ROSTER ── */
    .roster { width: 310px; flex-shrink: 0; }
    .roster-hd {
      text-align: center; color: rgba(255,255,255,.55);
      font-size: .84em; margin-bottom: 10px;
      padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── WARRIOR CARD ── */
    .wcard {
      background: rgba(255,255,255,.07);
      border: 2px solid var(--c);
      border-radius: 14px; padding: 12px 8px;
      text-align: center; cursor: grab;
      transition: transform .2s, box-shadow .2s, opacity .3s, filter .3s;
      position: relative; overflow: hidden;
    }
    .wcard:not(.gone):not(.is-champ):hover {
      transform: translateY(-5px) scale(1.04);
      box-shadow: 0 8px 22px var(--c);
    }
    .wcard.dragging { opacity: .35; cursor: grabbing; }
    .wcard.gone {
      opacity: .22; cursor: default;
      filter: grayscale(.85) brightness(.6);
    }
    .wcard.gone::after {
      content: '💀';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2em; background: rgba(0,0,0,.4);
      border-radius: 12px; z-index: 1;
    }
    .wcard.is-champ {
      border-color: #ffd700;
      box-shadow: 0 0 18px rgba(255,215,0,.4);
      opacity: .5; cursor: default;
    }
    .wcard.is-champ::after {
      content: '👑';
      position: absolute; top: 4px; right: 6px;
      font-size: 1em; z-index: 1;
    }
    .wcard .em { font-size: 2.2em; display: block; margin-bottom: 3px; }
    .wcard .nm { font-size: .76em; color: rgba(255,255,255,.88); margin-bottom: 6px; font-weight: 600; }
    .badge {
      display: inline-block; padding: 2px 10px;
      border-radius: 20px; font-size: .82em; font-weight: 700;
      background: rgba(255,255,255,.08); color: rgba(255,255,255,.3);
      transition: all .5s;
    }
    .badge.show {
      background: rgba(255,215,0,.18); color: #ffd700;
      border: 1px solid rgba(255,215,0,.4);
    }
    .tip {
      margin-top: 10px; font-size: .8em; color: rgba(255,255,255,.38);
      text-align: center; padding: 8px 10px;
      background: rgba(255,255,255,.03); border-radius: 10px;
      line-height: 1.5;
    }

    /* ── ARENA SECTION ── */
    .arena-sec { flex: 1; min-width: 0; }

    /* ── STAGE ── */
    .stage {
      position: relative; overflow: hidden;
      background: radial-gradient(ellipse at 50% 55%, rgba(255,215,0,.1) 0%, transparent 68%);
      border: 2px solid rgba(255,215,0,.25);
      border-radius: 22px; padding: 28px 20px;
      min-height: 360px;
      display: flex; align-items: center; justify-content: center;
      transition: box-shadow .3s, border-color .3s;
    }
    .stage.drop-active {
      box-shadow: 0 0 50px rgba(255,215,0,.35);
      border-color: rgba(255,215,0,.75);
    }
    /* decorative ring */
    .stage::before {
      content: '';
      position: absolute; width: 290px; height: 290px;
      border-radius: 50%; border: 2px dashed rgba(255,215,0,.1);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }
    .stage::after {
      content: '';
      position: absolute; width: 220px; height: 220px;
      border-radius: 50%; border: 1px dashed rgba(255,215,0,.06);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }

    /* ── THRONE ── */
    .throne {
      position: relative; z-index: 2;
      width: 180px; min-height: 200px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
    }
    .throne-empty { color: rgba(255,215,0,.35); font-size: .85em; line-height: 1.65; }
    .throne-empty-icon { font-size: 2.5em; margin-bottom: 8px; }

    .champ-card {
      display: flex; flex-direction: column; align-items: center;
      animation: popIn .45s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn { from { transform: scale(.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .champ-crown { font-size: 1.9em; animation: bob 1.8s ease-in-out infinite; }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    .champ-em { font-size: 4em; margin: 4px 0; }
    .champ-nm { font-size: .9em; font-weight: 700; color: rgba(255,255,255,.9); margin-bottom: 5px; }
    .champ-pw {
      font-size: 2.2em; font-weight: 900; color: #ffd700;
      text-shadow: 0 0 16px rgba(255,215,0,.65);
    }
    .champ-lbl { font-size: .72em; color: rgba(255,215,0,.55); letter-spacing: 2px; margin-top: 3px; }

    /* ── FX LAYER ── */
    .fx-layer {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 5;
    }
    .fx-ring {
      position: absolute; border-radius: 50%;
      animation: ring .75s ease-out forwards;
    }
    @keyframes ring { from { width: 0; height: 0; opacity: 1; } to { width: 260px; height: 260px; opacity: 0; } }

    /* ── BATTLE POPUP ── */
    .battle-popup {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 8; pointer-events: none;
    }
    .popup-inner {
      background: rgba(4,4,20,.94);
      border-radius: 20px; padding: 20px 28px;
      text-align: center; min-width: 270px;
      transform: scale(0); opacity: 0;
      transition: transform .32s cubic-bezier(.34,1.56,.64,1), opacity .32s;
    }
    .popup-inner.show { transform: scale(1); opacity: 1; }
    .popup-inner.pw { border: 2px solid rgba(255,215,0,.75); box-shadow: 0 0 36px rgba(255,215,0,.3); }
    .popup-inner.pl { border: 2px solid rgba(100,140,255,.65); box-shadow: 0 0 36px rgba(100,140,255,.2); }

    /* ── DROP HINT ── */
    .drop-hint {
      text-align: center; margin-top: 11px;
      color: rgba(255,215,0,.5); font-size: .83em;
    }
    .bounce { display: inline-block; animation: bn 1s ease infinite; }
    @keyframes bn { 0%,100% { transform: translateY(0); } 50% { transform: translateY(5px); } }

    /* ── ACTIONS ── */
    .actions { display: flex; justify-content: center; gap: 12px; margin-top: 14px; }
    .btn {
      padding: 11px 26px; border-radius: 50px; border: none;
      cursor: pointer; font-size: .95em; font-weight: 700;
      font-family: inherit; transition: all .2s;
    }
    .btn-gold {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #1a1000; box-shadow: 0 4px 16px rgba(255,215,0,.35);
    }
    .btn-gold:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 7px 24px rgba(255,215,0,.55); }
    .btn-gold:disabled { opacity: .32; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: rgba(255,255,255,.08); color: rgba(255,255,255,.7);
      border: 1px solid rgba(255,255,255,.15);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.15); }

    /* ── LOG ── */
    .log {
      margin-top: 14px;
      background: rgba(0,0,0,.3); border-radius: 12px;
      padding: 10px 14px; max-height: 118px; overflow-y: auto;
    }
    .log::-webkit-scrollbar { width: 4px; }
    .log::-webkit-scrollbar-thumb { background: rgba(255,215,0,.25); border-radius: 2px; }
    .log-hd { font-size: .75em; color: rgba(255,255,255,.38); margin-bottom: 6px; }
    .log-row {
      font-size: .8em; color: rgba(255,255,255,.65);
      padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,.05);
      line-height: 1.5;
    }
    .log-row:last-child { border: none; }
    .hi { color: #ffd700; } .lo { color: #88aaff; }

    /* ── RESULT OVERLAY ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    .overlay.on { display: flex; }
    .res-card {
      background: linear-gradient(145deg, #131325, #1a1a3a);
      border-radius: 24px; padding: 38px 46px;
      text-align: center; max-width: 450px; width: 92%;
      animation: card-pop .5s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes card-pop { from { transform: scale(.2) rotate(-8deg); opacity: 0; } to { transform: none; opacity: 1; } }
    .res-card.win-card { border: 2px solid rgba(255,215,0,.75); box-shadow: 0 0 70px rgba(255,215,0,.35); }
    .res-card.lose-card { border: 2px solid rgba(120,120,255,.5); box-shadow: 0 0 50px rgba(120,120,255,.25); }
    .res-big { font-size: 4em; animation: fl 1.2s ease-in-out infinite alternate; }
    @keyframes fl { from { transform: translateY(-4px); } to { transform: translateY(5px); } }
    .res-title { font-size: 2em; font-weight: 900; margin: 10px 0 8px; }
    .win-card .res-title {
      background: linear-gradient(90deg, #ffd700, #ff6b35);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .lose-card .res-title { color: #aaaaff; }
    .res-msg { color: rgba(255,255,255,.72); font-size: .92em; line-height: 1.65; margin-bottom: 16px; }
    .top3-box {
      background: rgba(255,255,255,.04); border-radius: 14px;
      padding: 12px; margin-bottom: 20px;
    }
    .top3-lbl { font-size: .75em; color: rgba(255,255,255,.4); margin-bottom: 8px; }
    .top3 { display: flex; justify-content: center; gap: 10px; }
    .t3item { text-align: center; padding: 8px 12px; border-radius: 10px; }
    .t3item.gold { background: rgba(255,215,0,.14); border: 1px solid rgba(255,215,0,.3); }
    .t3em { font-size: 1.5em; }
    .t3nm { font-size: .7em; color: rgba(255,255,255,.6); }
    .t3pw { font-size: .9em; font-weight: 700; color: #ffd700; }

    /* ── CONFETTI ── */
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
    .cf {
      position: absolute; top: -14px;
      animation: cf-fall var(--d) linear var(--dd) forwards;
      opacity: 1;
    }
    @keyframes cf-fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      .game { flex-direction: column; }
      .roster { width: 100%; }
    }
  </style>
</head>
<body>

<div id="stars"></div>

<div class="wrap">
  <!-- Header -->
  <h1>⚔️ 擂台争霸 ⚔️</h1>
  <p class="subtitle">10 位神秘勇士，谁才是真正的最强王者？拖动勇士上擂台，战斗后才能揭晓实力！</p>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <span class="stat-lbl">⚔️ 挑战次数</span>
      <span class="stat-val" id="sBattle">0</span>
    </div>
    <div class="stat">
      <span class="stat-lbl">🏆 当前擂主</span>
      <span class="stat-val" id="sChamp" style="min-width:60px">虚位以待</span>
    </div>
    <div class="stat">
      <span class="stat-lbl">👁️ 已探明</span>
      <span class="stat-val"><span id="sRevealed">0</span>/10</span>
    </div>
    <div class="stat">
      <span class="stat-lbl">📈 已知最高战力</span>
      <span class="stat-val" id="sMax">—</span>
    </div>
  </div>

  <!-- Game -->
  <div class="game">

    <!-- Roster -->
    <div class="roster">
      <div class="roster-hd">⚡ 待战勇士（拖动或点击挑战擂主）</div>
      <div class="cards-grid" id="cardsGrid"></div>
      <div class="tip">💡 勇士战力隐藏中……上擂台打一场才能揭晓！<br>找到最强王者后点击宣告胜利！</div>
    </div>

    <!-- Arena -->
    <div class="arena-sec">
      <div class="stage" id="stage">
        <!-- throne -->
        <div class="throne" id="throne">
          <div id="throneInner">
            <div class="throne-empty">
              <div class="throne-empty-icon">🪑</div>
              <div>将勇士拖到这里<br>或直接点击勇士<br>开始挑战！</div>
            </div>
          </div>
        </div>
        <!-- fx layers -->
        <div class="fx-layer" id="fxLayer"></div>
        <div class="battle-popup" id="bPopup">
          <div class="popup-inner" id="bPopupInner"></div>
        </div>
      </div>

      <div class="drop-hint" id="dropHint">
        <span class="bounce">👆</span> 把左边的勇士拖到擂台上来挑战
      </div>

      <div class="actions">
        <button class="btn btn-gold" id="declareBtn" disabled>
          👑 就是他！宣告最强王者！
        </button>
        <button class="btn btn-ghost" id="resetBtn">🔄 重新开始</button>
      </div>

      <div class="log">
        <div class="log-hd">📜 战斗记录</div>
        <div id="logBody">
          <div class="log-row" style="color:rgba(255,255,255,.22);font-style:italic">尚无记录……</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Result overlay -->
<div class="overlay" id="overlay">
  <div class="res-card" id="resCard">
    <div class="res-big" id="resEmoji">🏆</div>
    <div class="res-title" id="resTitle"></div>
    <div class="res-msg" id="resMsg"></div>
    <div class="top3-box">
      <div class="top3-lbl">🏅 真实实力榜（前三名）</div>
      <div class="top3" id="resTop3"></div>
    </div>
    <button class="btn btn-gold" onclick="resetGame()">🔄 再来一局</button>
  </div>
</div>

<div id="confetti"></div>

<script>
/* ======== WARRIOR DEFINITIONS ======== */
const DEFS = [
  { name:'烈火战神', emoji:'🔥', color:'rgba(255,100,60,.5)' },
  { name:'冰霜女王', emoji:'❄️', color:'rgba(80,180,255,.5)' },
  { name:'雷霆天将', emoji:'⚡', color:'rgba(255,230,30,.5)' },
  { name:'暗影刺客', emoji:'🌑', color:'rgba(180,80,255,.5)' },
  { name:'圣光骑士', emoji:'✨', color:'rgba(255,255,200,.4)' },
  { name:'毒蛇弓手', emoji:'🐍', color:'rgba(60,220,110,.5)' },
  { name:'钢铁巨人', emoji:'🤖', color:'rgba(160,160,160,.5)' },
  { name:'狂暴战士', emoji:'⚔️', color:'rgba(255,140,60,.5)' },
  { name:'风暴法师', emoji:'🌪️', color:'rgba(60,220,220,.5)' },
  { name:'龙裔勇者', emoji:'🐲', color:'rgba(255,180,40,.5)' },
];

const CRIES    = ['一鸣惊人！','势不可挡！','天下无敌！','王者之力！','气吞山河！','神挡杀神！','所向无敌！','战无不胜！'];
const TAUNTS   = ['还不够看！','以为够格？','差得远呢！','下一位！'];

/* ======== STATE ======== */
let warriors, champion, battleCount, busy, dragId, dragOver;

/* ======== INIT ======== */
function initStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = (Math.random() * 2.2 + .4).toFixed(1);
    s.style.cssText =
      `width:${sz}px;height:${sz}px;` +
      `top:${(Math.random()*100).toFixed(1)}%;` +
      `left:${(Math.random()*100).toFixed(1)}%;` +
      `--d:${(Math.random()*3+1.5).toFixed(1)}s;` +
      `--dd:${(Math.random()*2).toFixed(1)}s`;
    c.appendChild(s);
  }
}

function genUniquePowers() {
  const set = new Set();
  while (set.size < 10) set.add(Math.floor(Math.random() * 99) + 1);
  return [...set];
}

function initGame() {
  const powers = genUniquePowers();
  warriors = DEFS.map((d, i) => ({
    ...d, id: i, power: powers[i],
    revealed: false, inArena: false, isChamp: false
  }));
  champion  = null;
  battleCount = 0;
  busy      = false;
  dragId    = null;
  dragOver  = 0;

  renderRoster();
  renderThrone();
  updateStats();
  clearLog();
  document.getElementById('declareBtn').disabled = true;
  document.getElementById('dropHint').style.display = 'block';
  document.getElementById('stage').classList.remove('drop-active');
  document.getElementById('bPopupInner').className = 'popup-inner';
  document.getElementById('fxLayer').innerHTML = '';
}

/* ======== RENDER ======== */
function renderRoster() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  warriors.forEach(w => {
    const div = document.createElement('div');
    const stateClass = w.isChamp ? 'is-champ' : w.inArena ? 'gone' : '';
    div.className = `wcard ${stateClass}`;
    div.id = `w${w.id}`;
    div.style.setProperty('--c', w.color);

    if (!w.inArena && !w.isChamp) {
      div.draggable = true;
      div.addEventListener('dragstart', e => {
        if (busy) { e.preventDefault(); return; }
        dragId = w.id;
        div.classList.add('dragging');
      });
      div.addEventListener('dragend', () => {
        div.classList.remove('dragging');
        dragId = null;
      });
      div.addEventListener('click', () => {
        if (!busy) triggerChallenge(w.id);
      });
    }

    div.innerHTML =
      `<span class="em">${w.emoji}</span>` +
      `<div class="nm">${w.name}</div>` +
      `<div class="badge${w.revealed ? ' show' : ''}">` +
        (w.revealed ? `战力&nbsp;<b>${w.power}</b>` : '??? 神秘战力') +
      `</div>`;

    grid.appendChild(div);
  });
}

function renderThrone() {
  const inner = document.getElementById('throneInner');
  if (!champion) {
    inner.innerHTML =
      `<div class="throne-empty">` +
        `<div class="throne-empty-icon">🪑</div>` +
        `<div>将勇士拖到这里<br>或直接点击勇士<br>开始挑战！</div>` +
      `</div>`;
  } else {
    inner.innerHTML =
      `<div class="champ-card">` +
        `<div class="champ-crown">👑</div>` +
        `<div class="champ-em">${champion.emoji}</div>` +
        `<div class="champ-nm">${champion.name}</div>` +
        `<div class="champ-pw">${champion.power}</div>` +
        `<div class="champ-lbl">当前擂主</div>` +
      `</div>`;
  }
}

function updateStats() {
  document.getElementById('sBattle').textContent = battleCount;
  document.getElementById('sChamp').textContent  = champion ? champion.name : '虚位以待';
  const rev = warriors.filter(w => w.revealed);
  document.getElementById('sRevealed').textContent = rev.length;
  const mx = rev.length ? Math.max(...rev.map(w => w.power)) : null;
  document.getElementById('sMax').textContent = mx !== null ? mx : '—';
}

/* ======== DRAG & DROP ======== */
const stage = document.getElementById('stage');

stage.addEventListener('dragenter', e => {
  e.preventDefault();
  dragOver++;
  stage.classList.add('drop-active');
});
stage.addEventListener('dragleave', () => {
  if (--dragOver <= 0) {
    dragOver = 0;
    stage.classList.remove('drop-active');
  }
});
stage.addEventListener('dragover', e => e.preventDefault());
stage.addEventListener('drop', e => {
  e.preventDefault();
  dragOver = 0;
  stage.classList.remove('drop-active');
  if (dragId !== null && !busy) {
    const id = dragId;
    dragId = null;
    triggerChallenge(id);
  }
});

/* ======== BATTLE LOGIC ======== */
async function triggerChallenge(id) {
  if (busy) return;
  const w = warriors[id];
  if (w.inArena || w.isChamp) return;

  busy = true;
  w.revealed = true;
  w.inArena  = true;
  battleCount++;
  document.getElementById('dropHint').style.display = 'none';

  if (!champion) {
    /* first warrior: becomes champion instantly */
    w.isChamp = true;
    champion  = w;
    renderThrone();
    renderRoster();
    updateStats();
    document.getElementById('declareBtn').disabled = false;
    addLog(
      `🎉 ${w.emoji} <b>${w.name}</b> 登上擂台，` +
      `战力 <span class="hi">${w.power}</span>，首位擂主诞生！`
    );
    busy = false;
  } else {
    const prev = champion;
    renderRoster();
    updateStats();
    await doBattle(prev, w);
    renderRoster();
    renderThrone();
    updateStats();
    busy = false;
  }
}

async function doBattle(prev, challenger) {
  showFX();
  await sleep(380);

  const prevWins = prev.power > challenger.power;
  const winner   = prevWins ? prev : challenger;
  const loser    = prevWins ? challenger : prev;

  const inner = document.getElementById('bPopupInner');
  const cry   = rnd(prevWins ? CRIES : TAUNTS);
  inner.className = `popup-inner show ${prevWins ? 'pw' : 'pl'}`;
  inner.innerHTML =
    `<div style="font-size:1.8em;margin-bottom:7px">${winner.emoji}</div>` +
    `<div style="font-weight:700;font-size:1.08em;color:${prevWins ? '#ffd700' : '#aaaaff'};margin-bottom:6px">` +
      (prevWins ? '✅ 擂主守擂！' : '🔄 新王降临！') +
    `</div>` +
    `<div style="font-size:.9em;color:rgba(255,255,255,.8);margin-bottom:7px">` +
      `<span style="color:#ffd700">${prev.name} <b>${prev.power}</b></span>` +
      `<span style="color:rgba(255,255,255,.35)"> vs </span>` +
      `<span style="color:#aaaaff">${challenger.name} <b>${challenger.power}</b></span>` +
    `</div>` +
    `<div style="font-size:.83em;color:#ffd700">${cry}</div>`;

  await sleep(1850);
  inner.className = 'popup-inner';

  if (!prevWins) {
    prev.isChamp      = false;
    challenger.isChamp = true;
    champion           = challenger;
  } else {
    challenger.isChamp = false;
  }

  addLog(
    `⚔️ ${prev.emoji}${prev.name}(${prev.power}) ` +
    `<span style="color:rgba(255,255,255,.28)">VS</span> ` +
    `${challenger.emoji}${challenger.name}(${challenger.power}) → ` +
    (prevWins
      ? `<span class="hi">擂主守擂 💪</span>`
      : `<span class="lo">新擂主诞生 👑</span>`)
  );
}

function showFX() {
  const layer  = document.getElementById('fxLayer');
  layer.innerHTML = '';
  const colors = [
    'rgba(255,120,20,.85)',
    'rgba(255,215,0,.65)',
    'rgba(255,60,60,.45)',
  ];
  colors.forEach((c, i) => {
    const r = document.createElement('div');
    r.className  = 'fx-ring';
    r.style.cssText = `border:3px solid ${c};animation-delay:${(i * .18).toFixed(2)}s`;
    layer.appendChild(r);
  });
  setTimeout(() => { layer.innerHTML = ''; }, 950);
}

/* ======== LOG ======== */
function addLog(html) {
  const body = document.getElementById('logBody');
  const placeholder = body.querySelector('[style*="italic"]');
  if (placeholder) placeholder.remove();
  const row = document.createElement('div');
  row.className = 'log-row';
  row.innerHTML  = html;
  body.insertBefore(row, body.firstChild);
}

function clearLog() {
  document.getElementById('logBody').innerHTML =
    '<div class="log-row" style="color:rgba(255,255,255,.22);font-style:italic">尚无记录……</div>';
}

/* ======== DECLARE WINNER ======== */
document.getElementById('declareBtn').addEventListener('click', () => {
  if (!champion || busy) return;
  const trueMax = warriors.reduce((m, w) => w.power > m.power ? w : m);
  showResult(champion.id === trueMax.id, trueMax);
});

function showResult(win, trueMax) {
  warriors.forEach(w => (w.revealed = true));
  renderRoster();

  const card = document.getElementById('resCard');
  card.className = `res-card ${win ? 'win-card' : 'lose-card'}`;

  document.getElementById('resEmoji').textContent = win ? '🏆' : '😔';
  document.getElementById('resTitle').textContent = win ? '王者降临！' : '差一点点……';

  const eff = win ? getEff(battleCount) : '';
  document.getElementById('resMsg').innerHTML = win
    ? `你只用了 <b style="color:#ffd700">${battleCount}</b> 次挑战，` +
      `成功找出了最强王者 ${champion.emoji}<b>${champion.name}</b>（战力 ${champion.power}）！<br>` +
      `<span style="color:#ffd700;font-size:.95em">${eff}</span>`
    : `你选择的 ${champion.emoji}<b>${champion.name}</b>（战力 ${champion.power}）并非最强，<br>` +
      `真正的王者是 ${trueMax.emoji}<b style="color:#ffd700">${trueMax.name}</b>（战力 <b style="color:#ffd700">${trueMax.power}</b>）。<br>` +
      `<small style="color:rgba(255,255,255,.42)">要找到最大值，需要让所有候选者都与当前最大值比较哦！</small>`;

  const sorted = [...warriors].sort((a, b) => b.power - a.power).slice(0, 3);
  document.getElementById('resTop3').innerHTML = sorted.map((w, i) =>
    `<div class="t3item ${i === 0 ? 'gold' : ''}">` +
      `<div>${['🥇','🥈','🥉'][i]}</div>` +
      `<div class="t3em">${w.emoji}</div>` +
      `<div class="t3nm">${w.name}</div>` +
      `<div class="t3pw">${w.power}</div>` +
    `</div>`
  ).join('');

  document.getElementById('overlay').classList.add('on');
  if (win) launchConfetti();
}

function getEff(n) {
  if (n <= 3) return '🌟🌟🌟 超神级效率！算法大师！';
  if (n <= 5) return '🌟🌟 非常聪明，策略精准！';
  if (n <= 7) return '🌟 稳扎稳打，不错！';
  return '你把所有勇士都试过一遍了，稳！';
}

/* ======== CONFETTI ======== */
function launchConfetti() {
  const c = document.getElementById('confetti');
  c.innerHTML = '';
  const colors = ['#ffd700','#ff4444','#4488ff','#44ff88','#ff88ff','#ff8844','#44ffdd'];
  for (let i = 0; i < 100; i++) {
    const el    = document.createElement('div');
    const color = colors[i % colors.length];
    const sz    = (Math.random() * 9 + 5).toFixed(0);
    const isCircle = Math.random() > .5;
    el.className = 'cf';
    el.style.cssText =
      `left:${(Math.random()*100).toFixed(1)}%;` +
      `width:${sz}px;height:${sz}px;` +
      `background:${color};` +
      `border-radius:${isCircle ? '50%' : '2px'};` +
      `--d:${(Math.random()*2+2).toFixed(1)}s;` +
      `--dd:${(Math.random()*1.5).toFixed(1)}s`;
    c.appendChild(el);
  }
  setTimeout(() => { c.innerHTML = ''; }, 5000);
}

/* ======== RESET ======== */
function resetGame() {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('confetti').innerHTML = '';
  initGame();
}
document.getElementById('resetBtn').addEventListener('click', resetGame);

/* ======== UTILS ======== */
const sleep = ms => new Promise(r => setTimeout(r, ms));
const rnd   = arr => arr[Math.floor(Math.random() * arr.length)];

/* ======== START ======== */
initStars();
initGame();
</script>
