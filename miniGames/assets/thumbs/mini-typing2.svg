<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160" fill="none">
  <defs>
    <linearGradient id="t2-sky" x1="0" y1="0" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#020818"/>
      <stop offset="0.5" stop-color="#050A1E"/>
      <stop offset="1"   stop-color="#071230"/>
    </linearGradient>
    <radialGradient id="t2-neb1" cx="50%" cy="40%" r="50%">
      <stop offset="0" stop-color="#12003A" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#050A1E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t2-neb2" cx="80%" cy="60%" r="40%">
      <stop offset="0" stop-color="#001A50" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#050A1E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t2-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00AAFF" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#00AAFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="240" height="160" rx="12" fill="url(#t2-sky)"/>
  <!-- Nebulas -->
  <ellipse cx="90"  cy="64"  rx="100" ry="60" fill="url(#t2-neb1)"/>
  <ellipse cx="190" cy="100" rx="80"  ry="50" fill="url(#t2-neb2)"/>

  <!-- Stars -->
  <circle cx="12"  cy="14"  r="0.8" fill="white" opacity="0.7"/>
  <circle cx="38"  cy="8"   r="1.2" fill="white" opacity="0.9"/>
  <circle cx="65"  cy="20"  r="0.8" fill="white" opacity="0.6"/>
  <circle cx="90"  cy="6"   r="1.0" fill="white" opacity="0.8"/>
  <circle cx="120" cy="14"  r="1.4" fill="white" opacity="0.9"/>
  <circle cx="148" cy="5"   r="0.8" fill="white" opacity="0.7"/>
  <circle cx="170" cy="18"  r="1.0" fill="white" opacity="0.6"/>
  <circle cx="200" cy="10"  r="1.2" fill="white" opacity="0.8"/>
  <circle cx="228" cy="22"  r="0.8" fill="white" opacity="0.7"/>
  <circle cx="18"  cy="44"  r="0.8" fill="white" opacity="0.5"/>
  <circle cx="50"  cy="36"  r="1.0" fill="white" opacity="0.7"/>
  <circle cx="210" cy="40"  r="0.8" fill="white" opacity="0.6"/>
  <circle cx="235" cy="55"  r="1.0" fill="white" opacity="0.7"/>
  <circle cx="10"  cy="80"  r="0.8" fill="white" opacity="0.5"/>
  <circle cx="30"  cy="100" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="220" cy="90"  r="0.8" fill="white" opacity="0.5"/>

  <!-- Thrust trail particles -->
  <circle cx="42" cy="81" r="3.5" fill="#00AAFF" opacity="0.7"/>
  <circle cx="30" cy="79" r="2.5" fill="#0066DD" opacity="0.5"/>
  <circle cx="20" cy="82" r="1.8" fill="#004499" opacity="0.4"/>
  <circle cx="46" cy="86" r="2.0" fill="#00CCFF" opacity="0.6"/>
  <circle cx="34" cy="87" r="1.4" fill="#0099FF" opacity="0.4"/>

  <!-- Ship glow -->
  <ellipse cx="88" cy="82" rx="32" ry="20" fill="url(#t2-glow)"/>

  <!-- Ship body -->
  <g transform="translate(88,82)">
    <!-- Upper wing -->
    <polygon points="2,-10 -14,-26 -25,-10" fill="#0C2244" stroke="#0077CC" stroke-width="1"/>
    <!-- Lower wing -->
    <polygon points="2,10 -14,26 -25,10"  fill="#0C2244" stroke="#0077CC" stroke-width="1"/>
    <!-- Body -->
    <polygon points="26,0 -20,-13 -26,0 -20,13" fill="#112255" stroke="#00D4FF" stroke-width="1.4"/>
    <!-- Cockpit -->
    <ellipse cx="6" cy="0" rx="9" ry="6" fill="#88DDFF"/>
    <!-- Thruster glow -->
    <ellipse cx="-27" cy="0" rx="14" ry="6" fill="#00AAFF" opacity="0.5"/>
  </g>

  <!-- Asteroid -->
  <g transform="translate(180,60) rotate(25)">
    <polygon points="0,-22 13,-15 20,0 14,16 0,20 -14,14 -20,0 -13,-15"
             fill="#3A2A1A" stroke="#8A6A4A" stroke-width="1.5"/>
    <circle cx="-5" cy="-6" r="5" stroke="#5A4A3A" stroke-width="1" fill="none"/>
  </g>

  <!-- Word panel -->
  <rect x="58" y="54" width="88" height="22" rx="6"
        fill="#050A1E" fill-opacity="0.88" stroke="#00D4FF" stroke-width="1.2"/>
  <text x="66" y="70" font-size="10" font-family="Consolas,monospace" fill="#00FF99">vec</text>
  <text x="88" y="70" font-size="10" font-family="Consolas,monospace" fill="#2E6080">tor</text>

  <!-- Title pill -->
  <rect x="6" y="6" width="108" height="20" rx="5" fill="#00D4FF" fill-opacity="0.15" stroke="#00D4FF" stroke-width="1"/>
  <text x="60" y="20" font-size="10.5" font-family="Arial,sans-serif"
        fill="#00D4FF" font-weight="bold" text-anchor="middle">SPACE TYPIST</text>

  <!-- Level pills at bottom -->
  <rect x="10"  y="136" width="30" height="14" rx="7" fill="#00D4FF22" stroke="#00D4FF44" stroke-width="1"/>
  <text x="25"  y="146" font-size="8" font-family="Arial" fill="#00AAFF" text-anchor="middle">LV1</text>
  <rect x="46"  y="136" width="30" height="14" rx="7" fill="#00D4FF22" stroke="#00D4FF44" stroke-width="1"/>
  <text x="61"  y="146" font-size="8" font-family="Arial" fill="#00AAFF" text-anchor="middle">LV2</text>
  <rect x="82"  y="136" width="30" height="14" rx="7" fill="#00AAFF33" stroke="#00AAFF88" stroke-width="1"/>
  <text x="97"  y="146" font-size="8" font-family="Arial" fill="#00CCFF" text-anchor="middle">LV3</text>
</svg>
