<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160" fill="none">
  <defs>
    <linearGradient id="mt-sky" x1="0" y1="0" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4DB8F0"/>
      <stop offset="0.7" stop-color="#87CEEB"/>
      <stop offset="1" stop-color="#C8F0A0"/>
    </linearGradient>
    <linearGradient id="mt-ground" x1="0" y1="104" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5CB85C"/>
      <stop offset="1" stop-color="#357A35"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="240" height="160" rx="12" fill="url(#mt-sky)"/>

  <!-- Sun -->
  <circle cx="30" cy="28" r="16" fill="#FFE040" opacity="0.95"/>
  <line x1="30" y1="6"  x2="30" y2="2"  stroke="#FFE040" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="50" x2="30" y2="54" stroke="#FFE040" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8"  y1="28" x2="4"  y2="28" stroke="#FFE040" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="52" y1="28" x2="56" y2="28" stroke="#FFE040" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="14" x2="11" y2="11" stroke="#FFE040" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="42" x2="49" y2="45" stroke="#FFE040" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="14" x2="49" y2="11" stroke="#FFE040" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="42" x2="11" y2="45" stroke="#FFE040" stroke-width="2" stroke-linecap="round"/>

  <!-- Cloud -->
  <circle cx="140" cy="22" r="12" fill="white" opacity="0.9"/>
  <circle cx="153" cy="25" r="9"  fill="white" opacity="0.9"/>
  <circle cx="128" cy="25" r="9"  fill="white" opacity="0.9"/>

  <!-- Ground -->
  <rect x="0" y="104" width="240" height="56" fill="url(#mt-ground)"/>
  <line x1="0" y1="104" x2="240" y2="104" stroke="#80C880" stroke-width="2"/>

  <!-- School building -->
  <g transform="translate(192 74)">
    <rect x="-24" y="0" width="48" height="30" rx="3" fill="#FEF9C3" stroke="#E6D040" stroke-width="1.2"/>
    <polygon points="-28,0 0,-22 28,0" fill="#E65C00"/>
    <line x1="0" y1="-22" x2="0" y2="-36" stroke="#bbb" stroke-width="1.5"/>
    <polygon points="0,-36 11,-31 0,-26" fill="#FF4444"/>
    <rect x="-20" y="6"  width="13" height="10" rx="2" fill="#7DD3FA"/>
    <rect x="7"   y="6"  width="13" height="10" rx="2" fill="#7DD3FA"/>
    <rect x="-7"  y="18" width="14" height="12" rx="2" fill="#7C3AED"/>
  </g>

  <!-- Tree -->
  <g transform="translate(20 90)">
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#7A5530" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0"  cy="-36" r="14" fill="#4CAE4C"/>
    <circle cx="10" cy="-28" r="10" fill="#5CB85C"/>
    <circle cx="-9" cy="-30" r="10" fill="#5CB85C"/>
  </g>

  <!-- Flower -->
  <g transform="translate(52 104)">
    <line x1="0" y1="0" x2="0" y2="-18" stroke="#3D9140" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-5" cy="-21" r="4" fill="#FF6B9D"/>
    <circle cx="5"  cy="-21" r="4" fill="#FF6B9D"/>
    <circle cx="0"  cy="-25" r="4" fill="#FF6B9D"/>
    <circle cx="0"  cy="-17" r="4" fill="#FF6B9D"/>
    <circle cx="0"  cy="-21" r="3.2" fill="#FFE040"/>
  </g>

  <!-- Teacher body -->
  <g transform="translate(88 75)">
    <!-- Legs -->
    <line x1="-5" y1="18" x2="-7" y2="32" stroke="#2A3A6A" stroke-width="5" stroke-linecap="round"/>
    <line x1="5"  y1="18" x2="7"  y2="32" stroke="#2A3A6A" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="-7" cy="33" rx="5" ry="3" fill="#1A1830"/>
    <ellipse cx="7"  cy="33" rx="5" ry="3" fill="#1A1830"/>
    <!-- Shirt -->
    <rect x="-13" y="-4" width="26" height="23" rx="4" fill="#F0F0F0"/>
    <!-- Tie -->
    <polygon points="-2,-4 2,-4 4,8 0,12 -4,8" fill="#E85555"/>
    <!-- Arm + book -->
    <line x1="13" y1="2" x2="26" y2="-3" stroke="#F0F0F0" stroke-width="5" stroke-linecap="round"/>
    <rect x="24" y="-7" width="9" height="12" rx="1.5" fill="#FF8C00"/>
    <line x1="28" y1="-6" x2="28" y2="4" stroke="white" stroke-width="0.8" stroke-opacity="0.5"/>
    <!-- Head -->
    <circle cx="0" cy="-16" r="13" fill="#F5C5A0"/>
    <!-- Hair -->
    <path d="M-12,-22 Q0,-33 12,-22" fill="#5A3A1A"/>
    <!-- Glasses frames -->
    <circle cx="-4.5" cy="-17" r="3.8" stroke="#444" stroke-width="1" fill="none"/>
    <circle cx="4.5"  cy="-17" r="3.8" stroke="#444" stroke-width="1" fill="none"/>
    <line x1="-0.7" y1="-17" x2="0.7" y2="-17" stroke="#444" stroke-width="1"/>
    <line x1="-8.3" y1="-17" x2="-9.5" y2="-16" stroke="#444" stroke-width="1"/>
    <line x1="8.3"  y1="-17" x2="9.5"  y2="-16" stroke="#444" stroke-width="1"/>
    <!-- Smile -->
    <path d="M-4,-11 Q0,-8 4,-11" stroke="#A06040" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Question panel -->
  <rect x="116" y="60" width="92" height="42" rx="7" fill="white" fill-opacity="0.92" stroke="#FFA030" stroke-width="1.5"/>
  <text x="124" y="76" font-size="9.5" font-family="Consolas,monospace" fill="#333">for(int i=0;</text>
  <text x="124" y="90" font-size="9.5" font-family="Consolas,monospace" fill="#E65C00">  i&lt;10; i++)</text>

  <!-- Answer pills: check / cross -->
  <rect x="44"  y="119" width="44" height="16" rx="8" fill="white" fill-opacity="0.88" stroke="#FFA030" stroke-width="1.2"/>
  <path d="M59,124 L63,129 L71,121" stroke="#28a745" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="96"  y="119" width="44" height="16" rx="8" fill="#FFA030"/>
  <line x1="109" y1="123" x2="115" y2="129" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="115" y1="123" x2="109" y2="129" stroke="white" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Title label -->
  <rect x="8" y="8" width="78" height="20" rx="5" fill="#E65C00" fill-opacity="0.88"/>
  <text x="47" y="22" font-size="11" font-family="Arial,sans-serif" fill="white" font-weight="bold" text-anchor="middle">Teacher</text>
</svg>
