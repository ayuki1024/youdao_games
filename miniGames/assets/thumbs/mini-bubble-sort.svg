<svg width="128" height="96" viewBox="0 0 128 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="oc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#020c28"/>
      <stop offset="0.7" stop-color="#052038"/>
      <stop offset="1"   stop-color="#06172a"/>
    </linearGradient>
    <linearGradient id="sd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c2925a"/>
      <stop offset="1" stop-color="#8b5c1a"/>
    </linearGradient>
    <radialGradient id="b1" cx="38%" cy="32%" r="68%"><stop offset="0" stop-color="hsla(0,70%,95%,0.72)"/><stop offset="0.7" stop-color="hsla(0,65%,42%,0.6)"/><stop offset="1" stop-color="hsla(0,75%,22%,0.82)"/></radialGradient>
    <radialGradient id="b2" cx="38%" cy="32%" r="68%"><stop offset="0" stop-color="hsla(65,70%,95%,0.72)"/><stop offset="0.7" stop-color="hsla(65,65%,42%,0.6)"/><stop offset="1" stop-color="hsla(65,75%,22%,0.82)"/></radialGradient>
    <radialGradient id="b3" cx="38%" cy="32%" r="68%"><stop offset="0" stop-color="hsla(130,70%,95%,0.72)"/><stop offset="0.7" stop-color="hsla(130,65%,42%,0.6)"/><stop offset="1" stop-color="hsla(130,75%,22%,0.82)"/></radialGradient>
    <radialGradient id="b4" cx="38%" cy="32%" r="68%"><stop offset="0" stop-color="hsla(195,70%,95%,0.72)"/><stop offset="0.7" stop-color="hsla(195,65%,42%,0.6)"/><stop offset="1" stop-color="hsla(195,75%,22%,0.82)"/></radialGradient>
    <radialGradient id="b5" cx="38%" cy="32%" r="68%"><stop offset="0" stop-color="hsla(260,70%,95%,0.72)"/><stop offset="0.7" stop-color="hsla(260,65%,42%,0.6)"/><stop offset="1" stop-color="hsla(260,75%,22%,0.82)"/></radialGradient>
  </defs>

  <!-- ocean -->
  <rect width="128" height="96" fill="url(#oc)"/>
  <!-- ray -->
  <polygon points="64,0 20,96 108,96" fill="rgba(110,185,255,0.06)"/>
  <!-- sand -->
  <rect x="0" y="78" width="128" height="18" fill="url(#sd)"/>
  <!-- seaweed -->
  <path d="M6,78 C0,65 10,60 6,50" stroke="#166534" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M122,78 C128,66 118,62 122,52" stroke="#15803d" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- small fish -->
  <g transform="translate(18,73)">
    <ellipse cx="0" cy="0" rx="7" ry="4" fill="#22c55e"/>
    <polygon points="-7,0 -12,-3 -12,3" fill="#15803d"/>
    <circle cx="4" cy="-1.2" r="1.4" fill="white"/>
    <circle cx="4.3" cy="-1.2" r=".7" fill="#0f172a"/>
  </g>
  <!-- blowing bubbles from fish -->
  <circle cx="25" cy="66" r="1.5" fill="none" stroke="rgba(134,239,172,0.6)" stroke-width="0.7"/>
  <circle cx="27" cy="58" r="1" fill="none" stroke="rgba(134,239,172,0.5)" stroke-width="0.6"/>

  <!-- bubble 1 (small, red) -->
  <circle cx="30" cy="52" r="9" fill="url(#b1)" stroke="hsla(0,82%,83%,0.45)" stroke-width="1"/>
  <ellipse cx="26.5" cy="48.5" rx="2.6" ry="1.6" transform="rotate(-30 26.5 48.5)" fill="rgba(255,255,255,0.70)"/>
  <text x="30" y="52.8" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI',sans-serif" font-weight="bold" font-size="7.5" fill="rgba(255,250,250,0.92)">1</text>

  <!-- bubble 2 (medium, yellow-green) — being swapped UP -->
  <circle cx="55" cy="38" r="13" fill="url(#b2)" stroke="hsla(65,82%,83%,0.45)" stroke-width="1.2"/>
  <ellipse cx="49.5" cy="33" rx="3.5" ry="2.2" transform="rotate(-30 49.5 33)" fill="rgba(255,255,255,0.70)"/>
  <text x="55" y="38.8" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI',sans-serif" font-weight="bold" font-size="10" fill="rgba(255,255,240,0.92)">3</text>
  <!-- swap arc arrow -->
  <path d="M55,50 Q72,28 90,42" stroke="rgba(147,210,255,0.55)" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-dasharray="3,2"/>
  <polygon points="90,42 85,38 87,44" fill="rgba(147,210,255,0.55)"/>

  <!-- bubble 3 (larger, green) -->
  <circle cx="83" cy="48" r="11" fill="url(#b3)" stroke="hsla(130,82%,83%,0.45)" stroke-width="1"/>
  <ellipse cx="78.5" cy="43.5" rx="3" ry="1.9" transform="rotate(-30 78.5 43.5)" fill="rgba(255,255,255,0.70)"/>
  <text x="83" y="48.8" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI',sans-serif" font-weight="bold" font-size="9" fill="rgba(245,255,245,0.92)">4</text>

  <!-- ripple between b2 and b3 -->
  <circle cx="69" cy="43" r="8" fill="none" stroke="rgba(147,210,255,0.22)" stroke-width="1"/>
  <circle cx="69" cy="43" r="13" fill="none" stroke="rgba(147,210,255,0.12)" stroke-width="1"/>

  <!-- bubble 4 (largest, blue) — sorted -->
  <circle cx="110" cy="44" r="15" fill="url(#b5)" stroke="hsla(260,82%,83%,0.45)" stroke-width="1.3"/>
  <ellipse cx="103.5" cy="38.5" rx="4" ry="2.5" transform="rotate(-30 103.5 38.5)" fill="rgba(255,255,255,0.68)"/>
  <circle cx="110" cy="44" r="17.5" fill="none" stroke="hsla(260,88%,74%,0.35)" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="110" y="44.8" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI',sans-serif" font-weight="bold" font-size="12" fill="rgba(248,245,255,0.92)">5</text>

  <!-- bg bubbles -->
  <circle cx="40" cy="20" r="1.8" fill="none" stroke="rgba(147,210,255,0.35)" stroke-width=".6"/>
  <circle cx="70" cy="12" r="1.2" fill="none" stroke="rgba(147,210,255,0.3)" stroke-width=".5"/>
  <circle cx="95" cy="22" r="1.4" fill="none" stroke="rgba(147,210,255,0.3)" stroke-width=".5"/>
</svg>
