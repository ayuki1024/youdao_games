<svg xmlns="http://www.w3.org/2000/svg" width="240" height="160" viewBox="0 0 240 160" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#FFF7ED"/>
      <stop offset="0.5" stop-color="#FEF9C3"/>
      <stop offset="1"   stop-color="#ECFDF5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="160" rx="14" fill="url(#bg)"/>
  <rect width="240" height="160" rx="14" fill="none" stroke="#FDE68A" stroke-width="2"/>

  <!-- Staff lines -->
  <line x1="28" y1="56" x2="212" y2="56" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="28" y1="70" x2="212" y2="70" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="28" y1="84" x2="212" y2="84" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="28" y1="98" x2="212" y2="98" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="28" y1="112" x2="212" y2="112" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Note 1 (orange) -->
  <ellipse cx="72" cy="97" rx="11" ry="8" fill="#F97316" transform="rotate(-15 72 97)"/>
  <line x1="83" y1="95" x2="83" y2="55" stroke="#F97316" stroke-width="3" stroke-linecap="round"/>

  <!-- Note 2 (yellow) -->
  <ellipse cx="118" cy="84" rx="11" ry="8" fill="#EAB308" transform="rotate(-15 118 84)"/>
  <line x1="129" y1="82" x2="129" y2="42" stroke="#EAB308" stroke-width="3" stroke-linecap="round"/>

  <!-- Note 3 (green) -->
  <ellipse cx="163" cy="98" rx="11" ry="8" fill="#22C55E" transform="rotate(-15 163 98)"/>
  <line x1="174" y1="96" x2="174" y2="56" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/>

  <!-- Beam connecting note 1 and 2 -->
  <line x1="83" y1="55" x2="129" y2="42" stroke="#F97316" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Small decorative note (blue, top-right) -->
  <ellipse cx="194" cy="65" rx="8" ry="6" fill="#3B82F6" transform="rotate(-15 194 65)"/>
  <line x1="202" y1="63" x2="202" y2="38" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Flag -->
  <path d="M202 38 C214 42 214 52 202 52" stroke="#3B82F6" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Sparkles -->
  <circle cx="44"  cy="42"  r="3" fill="#FDE68A"/>
  <circle cx="36"  cy="52"  r="2" fill="#FCA5A5"/>
  <circle cx="216" cy="110" r="3" fill="#C4B5FD"/>
  <circle cx="210" cy="120" r="2" fill="#6EE7B7"/>

  <!-- Title pill -->
  <rect x="8" y="8" width="144" height="22" rx="7" fill="#0F172A" fill-opacity="0.82"/>
  <text x="80" y="23" font-size="11" font-family="Arial,sans-serif"
        fill="#F9FAFB" font-weight="bold" text-anchor="middle">FOR BEAT RUSH</text>

  <!-- Bottom tag -->
  <rect x="148" y="132" width="84" height="18" rx="9"
        fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-opacity="0.5" stroke-width="1"/>
  <text x="190" y="144" font-size="9" font-family="Arial,sans-serif"
        fill="#15803D" font-weight="bold" text-anchor="middle">for loop + music</text>
</svg>
