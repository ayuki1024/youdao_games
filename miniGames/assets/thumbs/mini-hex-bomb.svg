<svg width="128" height="96" viewBox="0 0 128 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="bombBody" cx="30%" cy="25%" r="70%">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="bombRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="cannonMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e5e7eb"/>
      <stop offset="1" stop-color="#6b7280"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="128" height="96" fill="url(#bg)"/>

  <!-- matrix bits -->
  <g fill="#0f766e" fill-opacity="0.6" font-family="Consolas, monospace" font-size="8">
    <text x="6" y="14">01 10 11</text>
    <text x="86" y="18">10 01</text>
    <text x="10" y="32">1010</text>
    <text x="92" y="34">1111</text>
    <text x="8" y="52">1001</text>
    <text x="90" y="54">0110</text>
    <text x="20" y="72">1011</text>
    <text x="84" y="70">0101</text>
  </g>

  <!-- bomb -->
  <g transform="translate(78,20)">
    <rect x="16" y="-6" width="3" height="10" rx="1.5" fill="#facc15"/>
    <circle cx="17.5" cy="-7" r="2.5" fill="#f97316">
      <animate attributeName="r" values="2.5;4;2.5" dur="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="16.5" cy="20" r="14"
            fill="url(#bombBody)" stroke="url(#bombRing)" stroke-width="3"/>
    <circle cx="16.5" cy="20" r="8" fill="none" stroke="#22d3ee" stroke-width="1.4" opacity="0.8"/>
    <text x="16.5" y="23" text-anchor="middle"
          font-family="Consolas, monospace" font-size="10"
          fill="#22d3ee">A</text>
  </g>

  <!-- HEX BIN label -->
  <g font-family="Consolas, monospace" font-weight="700">
    <text x="12" y="28" font-size="13" fill="#22d3ee">HEX</text>
    <text x="12" y="42" font-size="11" fill="#e5e7eb">BOMB</text>
    <text x="12" y="56" font-size="8" fill="#6b7280">8 4 2 1</text>
  </g>

  <!-- small DEC tag -->
  <g font-family="Consolas, monospace" font-size="8" fill="#eab308">
    <rect x="88" y="64" width="26" height="12" rx="6" fill="none" stroke="#eab308" stroke-width="0.8"/>
    <text x="101" y="72" text-anchor="middle">DEC</text>
  </g>
</svg>

