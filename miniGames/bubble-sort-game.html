<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>气泡排序 · Bubble Sort</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#020617;color:#e2e8f0;
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#wrap{width:880px;max-width:100vw;display:flex;flex-direction:column}
#cv{display:block;width:100%;border-radius:16px 16px 0 0;cursor:default;
    box-shadow:0 0 50px rgba(56,189,248,.2);}
#cv.playable{cursor:pointer}
#ui{background:#060c1e;border:1px solid #1e293b;border-top:none;
    border-radius:0 0 16px 16px;padding:12px 18px 14px;
    display:flex;flex-direction:column;gap:9px;}
.ui-row{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap}
.tab{padding:6px 20px;border-radius:999px;border:1.5px solid #1e293b;
     background:transparent;color:#475569;font-size:.82rem;cursor:pointer;transition:all .2s;}
.tab.on{background:#6366f1;border-color:#6366f1;color:#fff;box-shadow:0 0 16px #6366f155}
.tab:hover:not(.on){border-color:#6366f1;color:#e2e8f0}
.btn{padding:8px 20px;border-radius:8px;border:none;font-size:.85rem;
     font-weight:600;cursor:pointer;transition:all .18s;}
.btn:active:not(:disabled){transform:scale(.94)}
.btn-p{background:linear-gradient(135deg,#818cf8,#6366f1);color:#fff;box-shadow:0 4px 16px #6366f130}
.btn-p:hover:not(:disabled){box-shadow:0 4px 26px #6366f155;transform:translateY(-1px)}
.btn-g{background:#111827;color:#94a3b8;border:1px solid #1e293b}
.btn-g:hover:not(:disabled){background:#1e293b;color:#e2e8f0}
.btn:disabled{opacity:.32;cursor:not-allowed!important;transform:none!important;box-shadow:none!important}
.spd{display:flex;align-items:center;gap:7px;color:#334155;font-size:.78rem}
.spd input{accent-color:#818cf8;width:85px}
.sz-row{display:flex;align-items:center;gap:5px;font-size:.78rem;color:#334155}
.sz{padding:3px 9px;border-radius:6px;border:1px solid #1e293b;
    background:transparent;color:#475569;font-size:.72rem;cursor:pointer;transition:all .15s;}
.sz.on{background:#1e293b;color:#e2e8f0}
.sz:hover:not(.on){border-color:#6366f1;color:#e2e8f0}
#hint{text-align:center;height:18px;font-size:.76rem;color:#334155;transition:color .25s}
#hint.ok{color:#38bdf8}  #hint.err{color:#f87171}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="880" height="530"></canvas>
  <div id="ui">
    <div class="ui-row">
      <button class="tab on" id="t-watch">👁 观看模式</button>
      <button class="tab" id="t-play">🎮 挑战模式</button>
    </div>
    <div id="hint"></div>
    <div class="ui-row">
      <button class="btn btn-p" id="btn-auto">▶ 自动排序</button>
      <button class="btn btn-g" id="btn-step">⟶ 单步</button>
      <div class="spd"><span>速度</span>
        <input type="range" id="spd" min="1" max="10" value="5">
        <span id="spd-lbl">5</span>
      </div>
    </div>
    <div class="ui-row">
      <div class="sz-row"><span>泡泡数量</span>
        <button class="sz on" data-n="6">6</button>
        <button class="sz" data-n="7">7</button>
        <button class="sz" data-n="8">8</button>
        <button class="sz" data-n="10">10</button>
      </div>
      <button class="btn btn-g" id="btn-rst">↺ 重置</button>
    </div>
  </div>
</div>
<script>
'use strict';

// ═══════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════
let _ac = null;
function getAC(){ if(!_ac) _ac=new(window.AudioContext||window.webkitAudioContext)(); return _ac; }
function resumeAC(){ try{getAC().resume();}catch(e){} }
function tone(freq,type,dur,gain,delay){
  try{
    const ctx=getAC(), t=ctx.currentTime+(delay||0);
    const osc=ctx.createOscillator(), env=ctx.createGain();
    osc.connect(env); env.connect(ctx.destination);
    osc.type=type||'sine'; osc.frequency.value=freq;
    env.gain.setValueAtTime(0,t);
    env.gain.linearRampToValueAtTime(gain||.1,t+.015);
    env.gain.exponentialRampToValueAtTime(.0001,t+dur);
    osc.start(t); osc.stop(t+dur+.05);
  }catch(e){}
}
const sfx = {
  cmp(v,n){ tone(200+(v/n)*500,'sine',.14,.08); },
  swp(v1,v2,n){ tone(180+(v1/n)*500,'triangle',.18,.12); tone(180+(v2/n)*500,'triangle',.18,.12,.09); },
  pop(){ tone(600+Math.random()*300,'sine',.07,.07); },
  click(){ tone(520,'sine',.06,.07); },
  err(){ tone(220,'sawtooth',.1,.1); tone(160,'sawtooth',.1,.1,.08); },
  win(){ [523,659,784,1047,1319,1568].forEach((f,i)=>tone(f,'triangle',.3,.15,i*.09)); },
};

// ═══════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const CW=880, CH=530, FLOOR_Y=460, SWIM_Y=285, MARGIN=55;

// ═══════════════════════════════════════════════
// OCEAN BACKGROUND PARTICLES
// ═══════════════════════════════════════════════
const bgBubs = Array.from({length:60},()=>({
  x:Math.random()*CW, y:Math.random()*CH,
  r:Math.random()*2.8+.4,
  vy:-(Math.random()*.5+.15), vx:(Math.random()-.5)*.12,
  a:Math.random()*.28+.05,
}));
function tickBgBubs(){ for(const b of bgBubs){b.y+=b.vy;b.x+=b.vx;if(b.y<-6){b.y=CH+6;b.x=Math.random()*CW;}} }
function drawBgBubs(){
  for(const b of bgBubs){
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(150,220,255,${b.a})`; ctx.fill();
    ctx.beginPath(); ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.28,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${b.a*.7})`; ctx.fill();
  }
}

// ═══════════════════════════════════════════════
// SEAWEED
// ═══════════════════════════════════════════════
const weeds=[
  {x:28,h:85,ph:0,c:'#15803d'},{x:95,h:60,ph:1.1,c:'#166534'},
  {x:800,h:78,ph:.6,c:'#15803d'},{x:860,h:55,ph:1.8,c:'#166534'},
  {x:440,h:50,ph:.9,c:'#14532d'},{x:200,h:42,ph:2.2,c:'#166534'},
  {x:660,h:48,ph:2.7,c:'#15803d'},
];
function drawWeeds(t){
  for(const w of weeds){
    const sw=Math.sin(t*1.4+w.ph)*11;
    ctx.beginPath();
    ctx.moveTo(w.x,FLOOR_Y);
    ctx.bezierCurveTo(w.x+sw*.25,FLOOR_Y-w.h*.35,w.x+sw*.8,FLOOR_Y-w.h*.7,w.x+sw,FLOOR_Y-w.h);
    ctx.strokeStyle=w.c; ctx.lineWidth=4; ctx.lineCap='round'; ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(w.x+sw,FLOOR_Y-w.h-5,5,9,Math.atan2(-8,sw)*.5,0,Math.PI*2);
    ctx.fillStyle='#22c55e'; ctx.fill();
  }
}

// ═══════════════════════════════════════════════
// DECORATIVE FISH (blowing fish at bottom)
// ═══════════════════════════════════════════════
let dfBubs=[]; // decorative fish bubbles
let lastBlow=0;
function updateDecorFish(t){
  if(t-lastBlow>2.2){ lastBlow=t;
    for(let i=0;i<5;i++) dfBubs.push({
      x:48+(Math.random()-.5)*6, y:FLOOR_Y-20,
      vy:-(Math.random()*.7+.3), vx:(Math.random()-.5)*.1,
      r:Math.random()*2.5+.8, a:.65,
    });
  }
  for(const b of dfBubs){b.y+=b.vy;b.x+=b.vx;b.a-=.007;}
  dfBubs=dfBubs.filter(b=>b.a>0);
}
function drawDecorFish(t){
  const wag=Math.sin(t*3.5)*.22;
  const blowing=Math.sin(t*1.5)>.6;
  ctx.save(); ctx.translate(35,FLOOR_Y-18); ctx.scale(2,2);
  // tail
  ctx.save(); ctx.translate(-14,0); ctx.rotate(wag);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10,-6); ctx.lineTo(-10,6); ctx.closePath();
  ctx.fillStyle='#15803d'; ctx.fill(); ctx.restore();
  // body
  ctx.beginPath(); ctx.ellipse(0,0,14,8,0,0,Math.PI*2);
  ctx.fillStyle='#22c55e'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(2,1,10,5.5,0,0,Math.PI*2);
  ctx.fillStyle='#4ade80'; ctx.fill();
  // eye
  ctx.beginPath(); ctx.arc(8,-2.5,2.5,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
  ctx.beginPath(); ctx.arc(8.4,-2.5,1.3,0,Math.PI*2); ctx.fillStyle='#0f172a'; ctx.fill();
  ctx.beginPath(); ctx.arc(8,-3.1,.5,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
  // mouth (open when blowing)
  if(blowing){ ctx.beginPath(); ctx.arc(13,2,2,0,Math.PI*2); ctx.fillStyle='#bbf7d0'; ctx.fill(); }
  else{
    ctx.beginPath(); ctx.moveTo(11,2); ctx.quadraticCurveTo(13,4,11,5);
    ctx.strokeStyle='#166534'; ctx.lineWidth=1.2; ctx.lineCap='round'; ctx.stroke();
  }
  ctx.restore();
  // decorative bubbles from fish mouth
  for(const b of dfBubs){
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(134,239,172,${b.a})`; ctx.lineWidth=.9; ctx.stroke();
  }
}

// Distant background fish
const distFish=[
  {x:-80,y:80,spd:.28,sc:.6,h:200,phase:0},
  {x:500,y:140,spd:.18,sc:.4,h:240,phase:2},
  {x:300,y:60,spd:.35,sc:.5,h:180,phase:1},
];
function updateDistFish(){ for(const f of distFish){f.x+=f.spd;if(f.x>CW+100)f.x=-120;} }
function drawDistFish(t){
  for(const f of distFish){
    ctx.save(); ctx.globalAlpha=.18; ctx.translate(f.x,f.y); ctx.scale(f.sc,f.sc);
    const wag=Math.sin(t*2.5+f.phase)*.15;
    ctx.save(); ctx.translate(-22,0); ctx.rotate(wag);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-14,-8); ctx.lineTo(-14,8); ctx.closePath();
    ctx.fillStyle=`hsl(${f.h},60%,55%)`; ctx.fill(); ctx.restore();
    ctx.beginPath(); ctx.ellipse(0,0,22,12,0,0,Math.PI*2);
    ctx.fillStyle=`hsl(${f.h},55%,55%)`; ctx.fill();
    ctx.beginPath(); ctx.arc(14,-3,3,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
    ctx.beginPath(); ctx.arc(14.5,-3,1.5,0,Math.PI*2); ctx.fillStyle='#0f172a'; ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
// OCEAN BACKGROUND DRAW
// ═══════════════════════════════════════════════
function drawOcean(t){
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#020c28'); g.addColorStop(.45,'#041830'); g.addColorStop(.75,'#052038'); g.addColorStop(1,'#06172a');
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  // light rays
  ctx.save();
  for(let i=0;i<6;i++){
    const ang=-0.38+i*.16+Math.sin(t*.3+i)*.02;
    const a=.022+Math.sin(t*.5+i*1.1)*.007;
    const x0=CW/2+Math.sin(ang)*55, sp=75+i*18;
    const rg=ctx.createLinearGradient(x0,0,x0+Math.sin(ang)*CH,CH);
    rg.addColorStop(0,`rgba(110,185,255,${a*2})`); rg.addColorStop(1,'rgba(110,185,255,0)');
    ctx.beginPath(); ctx.moveTo(x0,0); ctx.lineTo(x0+sp,CH); ctx.lineTo(x0-sp,CH); ctx.closePath();
    ctx.fillStyle=rg; ctx.fill();
  }
  ctx.restore();
  // caustic shimmer on sand
  for(let i=0;i<14;i++){
    const cx=60+i*58+Math.sin(t*1.2+i)*14, cy=FLOOR_Y+22+Math.sin(t*1.4+i*1.8)*7;
    ctx.beginPath(); ctx.ellipse(cx,cy,16+Math.sin(t+i)*4,3,0,0,Math.PI*2);
    ctx.fillStyle=`rgba(130,205,255,${.04+Math.sin(t*1.3+i)*.018})`; ctx.fill();
  }
  // sand floor
  const sg=ctx.createLinearGradient(0,FLOOR_Y,0,CH);
  sg.addColorStop(0,'#c2925a'); sg.addColorStop(.3,'#b5813f'); sg.addColorStop(1,'#8b5c1a');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.moveTo(0,FLOOR_Y);
  for(let x=0;x<=CW;x+=18) ctx.lineTo(x,FLOOR_Y+Math.sin(x*.035+t*.35)*2.5);
  ctx.lineTo(CW,CH); ctx.lineTo(0,CH); ctx.closePath(); ctx.fill();
  // sand dots
  ctx.save(); ctx.globalAlpha=.22;
  for(let i=0;i<45;i++){
    ctx.beginPath(); ctx.arc((i*53+90)%CW, FLOOR_Y+7+(i*29)%32, 1.5, 0, Math.PI*2);
    ctx.fillStyle='#fff8e7'; ctx.fill();
  }
  ctx.restore();
  drawWeeds(t);
}

// ═══════════════════════════════════════════════
// COMPARISON RIPPLE PARTICLES
// ═══════════════════════════════════════════════
let cmpParts=[], cmpRippleStart=-99;
function spawnCmpParts(x1,y1,x2,y2){
  cmpRippleStart = gameT;
  const cx=(x1+x2)/2, cy=(y1+y2)/2;
  for(let i=0;i<10;i++) cmpParts.push({
    x:cx+(Math.random()-.5)*(x2-x1)*.8,
    y:cy+(Math.random()-.5)*30,
    vy:-(Math.random()*.9+.3), vx:(Math.random()-.5)*.3,
    r:Math.random()*3+1, a:.75,
  });
}
function tickCmpParts(){ for(const p of cmpParts){p.y+=p.vy;p.x+=p.vx;p.a-=.014;} cmpParts=cmpParts.filter(p=>p.a>0); }
function drawCmpParts(){
  for(const p of cmpParts){
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(147,210,255,${p.a})`; ctx.lineWidth=.9; ctx.stroke();
    ctx.beginPath(); ctx.arc(p.x-p.r*.3,p.y-p.r*.3,p.r*.28,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${p.a*.7})`; ctx.fill();
  }
}
function drawRipple(x1,y1,x2,y2,t){
  const el=t-cmpRippleStart;
  if(el>1.2) return;
  const cx=(x1+x2)/2, cy=(y1+y2)/2;
  const maxR=Math.hypot(x2-x1,y2-y1)/2+30;
  for(let i=0;i<3;i++){
    const phase=(el*2.2+i*.5)%1.8;
    const r=(phase/1.8)*maxR;
    const a=(1-phase/1.8)*.4;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(147,210,255,${a})`; ctx.lineWidth=1.5; ctx.stroke();
  }
}

// ─── 比较指示：弯弧 + 两端向下箭头 ───
function drawCompareArrows(bi, bj, t){
  const bobi=Math.sin(t*1.75+bi.bobPhase)*5.5;
  const bobj=Math.sin(t*1.75+bj.bobPhase)*5.5;

  // 两端锚点：各泡泡正上方
  const x1=bi.x, y1=SWIM_Y+bi.yOff+bobi - bi.r - 6;
  const x2=bj.x, y2=SWIM_Y+bj.yOff+bobj - bj.r - 6;

  // 弧顶控制点：中间、往上拱起（随时间小幅抖动增加活泼感）
  const bob=Math.sin(t*3.5)*5;
  const midX=(x1+x2)/2;
  const archH=Math.abs(x2-x1)*0.45+20;
  const cpY=Math.min(y1,y2)-archH+bob;

  const pulse=0.70+Math.sin(t*5)*0.30;
  const h1=bi.hue, h2=bj.hue;
  const AH=11;  // 箭头头部尺寸

  ctx.save();

  // ── 弧线 ──
  const grad=ctx.createLinearGradient(x1,y1,x2,y2);
  grad.addColorStop(0,   `hsla(${h1},90%,78%,${pulse})`);
  grad.addColorStop(0.5, `rgba(255,255,255,${pulse*.85})`);
  grad.addColorStop(1,   `hsla(${h2},90%,78%,${pulse})`);

  ctx.shadowColor=`rgba(180,220,255,${pulse*.35})`;
  ctx.shadowBlur=10;
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.quadraticCurveTo(midX, cpY, x2, y2);
  ctx.strokeStyle=grad;
  ctx.lineWidth=2.8;
  ctx.lineCap='round';
  ctx.stroke();
  ctx.shadowBlur=0;

  // ── 左端箭头尖（朝下，贴泡泡顶）──
  ctx.save();
  ctx.shadowColor=`hsl(${h1},85%,65%)`; ctx.shadowBlur=10;
  ctx.beginPath();
  ctx.moveTo(x1, y1+3);              // 尖端
  ctx.lineTo(x1-AH*.6, y1-AH*.8);
  ctx.lineTo(x1+AH*.6, y1-AH*.8);
  ctx.closePath();
  ctx.fillStyle=`hsla(${h1},90%,75%,${pulse})`;
  ctx.fill();
  ctx.restore();

  // ── 右端箭头尖（朝下，贴泡泡顶）──
  ctx.save();
  ctx.shadowColor=`hsl(${h2},85%,65%)`; ctx.shadowBlur=10;
  ctx.beginPath();
  ctx.moveTo(x2, y2+3);
  ctx.lineTo(x2-AH*.6, y2-AH*.8);
  ctx.lineTo(x2+AH*.6, y2-AH*.8);
  ctx.closePath();
  ctx.fillStyle=`hsla(${h2},90%,75%,${pulse})`;
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

// ─── 双头交换箭头 ───
function drawSwapArrow(bi, bj, t){
  // 箭头画在两泡泡中心之间，Y 位置取两者 yOff 均值稍低于泡泡底部
  const bobi=Math.sin(t*1.75+bi.bobPhase)*5.5;
  const bobj=Math.sin(t*1.75+bj.bobPhase)*5.5;
  const x1=bi.x, x2=bj.x;
  // 箭头 Y：两泡泡底部再往下 18px，避免遮挡球体
  const y1=SWIM_Y+bi.yOff+bobi+bi.r+18;
  const y2=SWIM_Y+bj.yOff+bobj+bj.r+18;
  const yArrow=Math.max(y1,y2); // 取较低的位置

  const dx=x2-x1, len=Math.abs(dx);
  if(len<8) return;

  const HEAD=Math.min(14, len*.18);   // 箭头头部长度
  const SHAFT=5;                       // 轴线粗细
  const pulse=0.72+Math.sin(t*7)*0.28; // 呼吸亮度
  const hue1=bi.hue, hue2=bj.hue;

  ctx.save();
  ctx.translate(x1, yArrow);

  // ── 箭杆渐变 ──
  const grad=ctx.createLinearGradient(0,0,dx,0);
  grad.addColorStop(0,   `hsla(${hue1},90%,72%,${pulse})`);
  grad.addColorStop(0.5, `rgba(255,255,255,${pulse*.85})`);
  grad.addColorStop(1,   `hsla(${hue2},90%,72%,${pulse})`);

  // 外层柔光
  ctx.beginPath();
  ctx.moveTo(HEAD, 0); ctx.lineTo(dx-HEAD, 0);
  ctx.strokeStyle=`rgba(255,255,255,${pulse*.22})`;
  ctx.lineWidth=SHAFT+6; ctx.lineCap='round'; ctx.stroke();

  // 轴线
  ctx.beginPath();
  ctx.moveTo(HEAD, 0); ctx.lineTo(dx-HEAD, 0);
  ctx.strokeStyle=grad;
  ctx.lineWidth=SHAFT; ctx.lineCap='round'; ctx.stroke();

  // ── 左箭头头部（← 方向）──
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(HEAD+1, -HEAD*.75);
  ctx.lineTo(HEAD+1,  HEAD*.75);
  ctx.closePath();
  ctx.fillStyle=`hsla(${hue1},90%,74%,${pulse})`;
  ctx.shadowColor=`hsl(${hue1},85%,65%)`; ctx.shadowBlur=10;
  ctx.fill();

  // ── 右箭头头部（→ 方向）──
  ctx.beginPath();
  ctx.moveTo(dx, 0);
  ctx.lineTo(dx-HEAD-1, -HEAD*.75);
  ctx.lineTo(dx-HEAD-1,  HEAD*.75);
  ctx.closePath();
  ctx.fillStyle=`hsla(${hue2},90%,74%,${pulse})`;
  ctx.shadowColor=`hsl(${hue2},85%,65%)`; ctx.shadowBlur=10;
  ctx.fill();

  // ── 中间文字 ⇄ ──
  ctx.shadowBlur=0;
  ctx.font=`bold ${Math.round(Math.min(16, len*.1)+10)}px 'Segoe UI',sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=`rgba(255,255,255,${pulse*.9})`;
  ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=5;
  ctx.fillText('⇄', dx/2, 0);

  ctx.restore();
}

// ═══════════════════════════════════════════════
// SPARKLES (win / sorted)
// ═══════════════════════════════════════════════
let sparks=[];
function spawnSparks(x,y,hue){
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*3+1;
    sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,r:Math.random()*3+1,a:1,hue});
  }
}
function tickSparks(){ for(const s of sparks){s.x+=s.vx;s.y+=s.vy;s.vy+=.07;s.a-=.022;} sparks=sparks.filter(s=>s.a>0); }
function drawSparks(){
  for(const s of sparks){
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${s.hue},90%,70%,${s.a})`; ctx.fill();
  }
}

// ═══════════════════════════════════════════════
// BUBBLE DRAWING
// ═══════════════════════════════════════════════
function bubbleHue(val,n){ return Math.round(((val-1)/Math.max(n-1,1))*260); }
function bubbleRadius(val,n){
  const sp=(CW-2*MARGIN)/n;
  const maxR=Math.min(42,Math.floor(sp*.44));
  const minR=Math.max(11,Math.floor(maxR*.36));
  return minR+Math.round(((val-1)/Math.max(n-1,1))*(maxR-minR));
}

function drawOneBubble(fx,fy,r,hue,state,t,phase,selected,isSorted){
  ctx.save();
  ctx.translate(fx,fy);

  // ── outer glow ──
  if(state==='comparing'||state==='swapping'||selected||isSorted){
    const pulse = isSorted ? 0 : Math.sin(t*6+phase)*.2;
    const gr=ctx.createRadialGradient(0,0,r*.4,0,0,r*(2.2+pulse));
    const a = isSorted ? .18 : .38;
    gr.addColorStop(0,`hsla(${hue},85%,70%,${a})`);
    gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr;
    ctx.beginPath(); ctx.arc(0,0,r*(2.2+pulse),0,Math.PI*2); ctx.fill();
  }

  // ── bubble sphere ──
  const wob = state==='comparing' ? Math.sin(t*8+phase)*.04 : 0;
  const rx=r*(1+wob), ry=r*(1-wob);
  const sg=ctx.createRadialGradient(-r*.26,-r*.3,r*.04,0,0,r);
  sg.addColorStop(0,  `hsla(${hue},70%,94%,0.72)`);
  sg.addColorStop(.32,`hsla(${hue},68%,70%,0.48)`);
  sg.addColorStop(.72,`hsla(${hue},65%,44%,0.58)`);
  sg.addColorStop(1,  `hsla(${hue},75%,26%,0.80)`);
  ctx.beginPath(); ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
  ctx.fillStyle=sg; ctx.fill();

  // ── rim ──
  ctx.strokeStyle=`hsla(${hue},80%,82%,0.48)`;
  ctx.lineWidth=1.4; ctx.stroke();

  // ── sorted ring ──
  if(isSorted){
    ctx.strokeStyle=`hsla(${hue},85%,75%,.55)`;
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,r+3,0,Math.PI*2); ctx.stroke();
  }

  // ── primary specular (top-left ellipse) ──
  ctx.beginPath();
  ctx.ellipse(-r*.27,-r*.31,r*.3,r*.18,-0.55,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.72)'; ctx.fill();

  // ── secondary specular (tiny dot) ──
  ctx.beginPath(); ctx.arc(-r*.52,-r*.48,r*.1,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fill();

  // ── inner refraction (bottom-right warm glow, like light passing through) ──
  ctx.beginPath();
  ctx.ellipse(r*.22,r*.36,r*.22,r*.12,0.28,0,Math.PI*2);
  ctx.fillStyle=`hsla(${hue},75%,88%,0.22)`; ctx.fill();

  // ── caustic inner ring ──
  ctx.beginPath(); ctx.arc(0,0,r*.7,0,Math.PI*2);
  ctx.strokeStyle=`hsla(${hue},70%,80%,0.12)`; ctx.lineWidth=r*.14; ctx.stroke();

  // ── number ──
  const fs=Math.max(10,Math.round(r*.9));
  ctx.font=`bold ${fs}px 'Segoe UI',sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor=`hsla(${hue},60%,18%,.9)`; ctx.shadowBlur=4;
  ctx.fillStyle=`hsla(${hue},15%,97%,0.92)`;
  ctx.fillText(String(Math.round(/* value */0)),0,r*.07); // filled below
  ctx.restore();
}

// Wrapper that passes value properly
function drawBubble(bub, t, selected){
  const bob=Math.sin(t*1.75+bub.bobPhase)*5.5;
  const fy=SWIM_Y+bub.yOff+bob;
  const isSrt=bub.state==='sorted';
  const r=bub.r, h=bub.hue;
  const state=bub.state;
  const phase=bub.bobPhase;

  // ── 残影轨迹（交换时，先用绝对坐标画，不受 translate 影响）──
  if(bub.trail.length>0){
    for(let ti=0;ti<bub.trail.length;ti++){
      const tp=bub.trail[ti];
      const ta=(1-(ti+1)/bub.trail.length)*0.35;
      const ts=1-ti/bub.trail.length*.3;
      const trailY=SWIM_Y+tp.y+bob; // bob相位近似同步
      ctx.save();
      ctx.globalAlpha=ta;
      // 填充残影球
      const tg=ctx.createRadialGradient(tp.x-r*.2,trailY-r*.25,0,tp.x,trailY,r*ts);
      tg.addColorStop(0,`hsla(${h},75%,88%,0.55)`);
      tg.addColorStop(1,`hsla(${h},70%,45%,0.2)`);
      ctx.beginPath(); ctx.arc(tp.x,trailY,r*ts,0,Math.PI*2);
      ctx.fillStyle=tg; ctx.fill();
      ctx.strokeStyle=`hsla(${h},80%,74%,0.5)`;
      ctx.lineWidth=1.5; ctx.stroke();
      ctx.restore();
    }
  }

  ctx.save(); ctx.translate(bub.x,fy);

  // outer glow
  if(state==='comparing'||state==='swapping'||selected||isSrt){
    const isSwp=(state==='swapping');
    const pulse=isSrt?0:Math.sin(t*6+phase)*.2;
    const glowR=r*(isSwp ? 3.5 : (isSrt ? 1.9 : 2.1+pulse));
    const gr=ctx.createRadialGradient(0,0,r*.4,0,0,glowR);
    const a=isSwp?.62:(isSrt?.16:.38);
    gr.addColorStop(0,`hsla(${h},90%,${isSwp?80:70}%,${a})`);
    gr.addColorStop(isSwp?.4:1,'transparent');
    if(isSwp) gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr;
    ctx.beginPath(); ctx.arc(0,0,glowR,0,Math.PI*2); ctx.fill();
  }

  // wobble on compare
  const wob=state==='comparing'?Math.sin(t*9+phase)*.035:0;
  const rx=r*(1+wob), ry=r*(1-wob);

  // sphere gradient
  const sg=ctx.createRadialGradient(-r*.26,-r*.3,r*.04,0,0,r);
  sg.addColorStop(0,  `hsla(${h},72%,95%,0.70)`);
  sg.addColorStop(.30,`hsla(${h},68%,68%,0.46)`);
  sg.addColorStop(.72,`hsla(${h},65%,42%,0.60)`);
  sg.addColorStop(1,  `hsla(${h},75%,24%,0.82)`);
  ctx.beginPath(); ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
  ctx.fillStyle=sg; ctx.fill();

  // rim stroke
  ctx.strokeStyle=`hsla(${h},82%,83%,0.46)`; ctx.lineWidth=1.5; ctx.stroke();

  // sorted decorative ring
  if(isSrt){
    ctx.strokeStyle=`hsla(${h},88%,74%,.42)`;
    ctx.lineWidth=2; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(0,0,r+4,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
  }

  // primary specular
  ctx.beginPath();
  ctx.ellipse(-r*.27,-r*.31,r*.31,r*.18,-0.55,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.74)'; ctx.fill();

  // secondary tiny specular
  ctx.beginPath(); ctx.arc(-r*.52,-r*.48,r*.1,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.56)'; ctx.fill();

  // bottom refraction glow
  ctx.beginPath();
  ctx.ellipse(r*.22,r*.36,r*.22,r*.12,.28,0,Math.PI*2);
  ctx.fillStyle=`hsla(${h},72%,88%,0.22)`; ctx.fill();

  // inner shimmer ring
  ctx.beginPath(); ctx.arc(0,0,r*.72,0,Math.PI*2);
  ctx.strokeStyle=`hsla(${h},65%,82%,0.11)`; ctx.lineWidth=r*.15; ctx.stroke();

  // number text
  const fs=Math.max(10,Math.round(r*.9));
  ctx.font=`bold ${fs}px 'Segoe UI',sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor=`hsla(${h},55%,16%,.95)`; ctx.shadowBlur=4;
  ctx.fillStyle=`hsla(${h},10%,97%,0.94)`;
  ctx.fillText(String(bub.value),0,r*.08);

  ctx.restore();
}

// bubble shadow on sand
function drawBubbleShadow(bub,t){
  const bob=Math.sin(t*1.75+bub.bobPhase)*5.5;
  const fy=SWIM_Y+bub.yOff+bob;
  const dist=FLOOR_Y-fy-bub.r;
  if(dist<0) return;
  const a=Math.min(.18,(.18*(1-dist/280)));
  const sw=bub.r*(1-dist/360);
  if(sw<2) return;
  ctx.beginPath();
  ctx.ellipse(bub.x,FLOOR_Y-4,sw,3.5,0,0,Math.PI*2);
  ctx.fillStyle=`rgba(0,0,0,${a})`; ctx.fill();
}

// ═══════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════
let N=6, mode='watch';
let arr=[], posBubs=[], positions=[];
let gen=null, running=false, gameDone=false;
let srtSet=new Set(), selIdx=-1;
let stats={c:0,s:0,p:0};
let t0=null, timerID=null;
let gameT=0, lastTs=0;
let comparing=[]; // [i, j] currently compared
let swapping=[];  // [i, j] currently swapping (for arrow draw)
let passLog=[];   // [{p, cmps, maxVal|null}]  每轮结果日志（null=进行中）
let curPass=1;    // 当前轮次编号
let minOps=0;     // 挑战模式：最少交换次数（初始逆序对数）
let playOps=0;    // 挑战模式：用户已操作次数
let winStars=0;   // 结算星级 1-3
let winElapsed=0; // 结算时冻结的用时（秒）
// 结算面板尺寸 & 关闭按钮（相对画布绝对坐标）
const PANEL_W=340, PANEL_H=240, PANEL_R=16;
const CLOSE_BTN={x:CW/2+PANEL_W/2-16, y:CH/2-PANEL_H/2+16, r:14};

function makeBub(value,x){
  return {
    value, hue:bubbleHue(value,N), r:bubbleRadius(value,N),
    x, targetX:x, yOff:0, targetYOff:0,
    state:'idle', bobPhase:Math.random()*Math.PI*2,
    fastLerp:false,   // 交换期间用快速插值
    trail:[],         // 残影轨迹 [{x,y}]
  };
}
function computePos(){
  const sp=(CW-2*MARGIN)/N;
  positions=arr.map((_,i)=>MARGIN+sp*(i+.5));
}
function initBubs(){
  computePos();
  posBubs=arr.map((v,i)=>makeBub(v,positions[i]));
}

// ═══════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════
let winAlpha=0, winTarget=0, winMsg='';

function render(ts){
  const dt=Math.min((ts-lastTs)/1000,.05);
  lastTs=ts; gameT+=dt;

  tickBgBubs(); tickCmpParts(); tickSparks();
  updateDecorFish(gameT); updateDistFish();
  // lerp bubble positions (fast during swap, normal otherwise)
  for(const b of posBubs){
    const k=Math.pow(b.fastLerp ? 0.00004 : 0.004, dt);
    b.x+=(b.targetX-b.x)*(1-k);
    b.yOff+=(b.targetYOff-b.yOff)*(1-k);
    // 记录残影轨迹
    if(b.state==='swapping'){
      b.trail.unshift({x:b.x, y:b.yOff});
      if(b.trail.length>9) b.trail.pop();
    } else if(b.trail.length>0){
      b.trail=[];
    }
  }

  ctx.clearRect(0,0,CW,CH);
  drawOcean(gameT);
  drawBgBubs();
  drawDistFish(gameT);
  drawDecorFish(gameT);

  // shadows
  for(const b of posBubs) drawBubbleShadow(b,gameT);

  // 比较指示：涟漪 + 指向箭头
  if(comparing.length===2){
    const bi=posBubs[comparing[0]], bj=posBubs[comparing[1]];
    const bobi=Math.sin(gameT*1.75+bi.bobPhase)*5.5;
    const bobj=Math.sin(gameT*1.75+bj.bobPhase)*5.5;
    drawRipple(bi.x,SWIM_Y+bi.yOff+bobi, bj.x,SWIM_Y+bj.yOff+bobj, gameT);
    drawCompareArrows(bi, bj, gameT);
  }


  drawCmpParts();

  // bubbles (sorted last so they render on top if needed)
  for(let i=0;i<posBubs.length;i++)
    drawBubble(posBubs[i],gameT,i===selIdx);

  drawSparks();
  drawHUD();
  drawTimer();
  drawPassLog();
  drawPlayHUD();
  drawWinOverlay(gameT);

  requestAnimationFrame(render);
}

// ─── 左上角挑战模式：最少次数 vs 已操作 ───
function drawPlayHUD(){
  if(mode!=='play') return;
  ctx.save();
  const PX=12, PY=12, PAD=10, W=188, LH=24;
  const H=PAD*2+LH*2+4;

  ctx.beginPath(); rr(PX,PY,W,H,8);
  ctx.fillStyle='rgba(4,10,28,.82)'; ctx.fill();
  ctx.strokeStyle='rgba(120,160,240,.28)'; ctx.lineWidth=1; ctx.stroke();

  ctx.textBaseline='middle';

  // 行1：最少次数
  const cy1=PY+PAD+LH/2;
  ctx.font='12px "Segoe UI",sans-serif'; ctx.textAlign='left';
  ctx.fillStyle='rgba(148,163,184,1)';
  ctx.fillText('最少次数', PX+PAD, cy1);
  ctx.font='bold 17px "Segoe UI",sans-serif';
  ctx.fillStyle='#facc15';
  ctx.shadowColor='rgba(250,204,21,.5)'; ctx.shadowBlur=8;
  ctx.fillText(String(minOps), PX+PAD+72, cy1);
  ctx.shadowBlur=0;
  ctx.font='12px "Segoe UI",sans-serif';
  ctx.fillStyle='rgba(148,163,184,.7)';
  ctx.fillText('次', PX+PAD+72+(minOps>9?22:14), cy1);

  // 行2：已操作（超出最少时变红）
  const cy2=PY+PAD+LH+LH/2+4;
  ctx.fillStyle='rgba(148,163,184,1)';
  ctx.fillText('已操作', PX+PAD, cy2);
  const over=playOps>minOps;
  ctx.font='bold 17px "Segoe UI",sans-serif';
  ctx.fillStyle=over?'#f87171':'#38bdf8';
  ctx.shadowColor=over?'rgba(248,113,113,.5)':'rgba(56,189,248,.5)'; ctx.shadowBlur=8;
  ctx.fillText(String(playOps), PX+PAD+72, cy2);
  ctx.shadowBlur=0;
  ctx.font='12px "Segoe UI",sans-serif';
  ctx.fillStyle='rgba(148,163,184,.7)';
  ctx.fillText('次', PX+PAD+72+(playOps>9?22:14), cy2);

  ctx.restore();
}

// ─── 左上角轮次日志 ───
function drawPassLog(){
  if(passLog.length===0) return;
  ctx.save();

  const PX=12, PY=12, PAD=10;
  const LH=22;   // 行高放大
  const W=224, H=PAD*2+passLog.length*LH+4;

  // 背景面板
  ctx.beginPath();
  rr(PX,PY,W,H,8);
  ctx.fillStyle='rgba(4,10,28,.82)';
  ctx.fill();
  ctx.strokeStyle='rgba(120,160,240,.28)';
  ctx.lineWidth=1; ctx.stroke();

  ctx.textBaseline='middle';

  passLog.forEach((row,i)=>{
    const cy=PY+PAD+LH*i+LH/2;  // 垂直居中
    const ongoing=row.maxVal===null;
    const pulse=ongoing?(0.72+Math.sin(gameT*6)*0.28):1;
    let dx=PX+PAD;

    // ── "第X轮：" 标签 ── 统一浅灰色
    ctx.font='12px "Segoe UI",sans-serif';
    ctx.fillStyle=`rgba(148,163,184,${pulse})`;
    ctx.textAlign='left';
    ctx.fillText(`第`,dx,cy); dx+=13;

    // 轮次数字：放大加粗黄色
    ctx.font='bold 15px "Segoe UI",sans-serif';
    ctx.fillStyle=`rgba(250,204,21,${pulse})`;
    ctx.fillText(`${row.p}`,dx,cy); dx+=row.p>9?18:12;

    ctx.font='12px "Segoe UI",sans-serif';
    ctx.fillStyle=`rgba(148,163,184,${pulse})`;
    ctx.fillText(`轮  比较`,dx,cy); dx+=42;

    // 比较次数：放大加粗青色
    ctx.font='bold 15px "Segoe UI",sans-serif';
    ctx.fillStyle=`rgba(56,189,248,${pulse})`;
    ctx.shadowColor='rgba(56,189,248,.5)';
    ctx.shadowBlur=ongoing?8:0;
    ctx.fillText(`${row.cmps}`,dx,cy);
    ctx.shadowBlur=0;
    dx+=row.cmps>9?18:12;

    ctx.font='12px "Segoe UI",sans-serif';
    ctx.fillStyle=`rgba(148,163,184,${pulse})`;
    ctx.fillText(`次`,dx,cy); dx+=16;

    // 最大值：仅完成后显示，放大加粗金色
    if(!ongoing){
      ctx.fillStyle='rgba(148,163,184,1)';
      ctx.fillText(`  最大`,dx,cy); dx+=34;
      ctx.font='bold 15px "Segoe UI",sans-serif';
      ctx.fillStyle='#ffffff';
      ctx.shadowColor='rgba(255,255,255,.45)';
      ctx.shadowBlur=8;
      ctx.fillText(`${row.maxVal}`,dx,cy);
      ctx.shadowBlur=0;
    }
  });

  ctx.restore();
}

// ─── HUD ───
let passTxt='准备开始';

// ─── 右上角计时器 ───
function drawTimer(){
  if(!t0) return;
  const sec = gameDone ? winElapsed : (Date.now()-t0)/1000;
  const m=Math.floor(sec/60), s=Math.floor(sec%60), ds=Math.floor((sec%1)*10);
  const txt=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${ds}`;
  ctx.save();
  const W=88, H=24, PX=CW-W-12, PY=12;
  ctx.beginPath(); rr(PX,PY,W,H,H/2);
  ctx.fillStyle='rgba(6,12,30,.76)'; ctx.fill();
  ctx.strokeStyle='#1e293b'; ctx.lineWidth=1; ctx.stroke();
  ctx.font='bold 13px "Segoe UI Mono",Consolas,monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#38bdf8';
  ctx.fillText(txt, PX+W/2, PY+H/2);
  ctx.restore();
}
function rr(x,y,w,h,r){
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawStar(cx,cy,R,fill,stroke){
  const r=R*.42, pts=5;
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){
    const a=i*Math.PI/pts - Math.PI/2;
    const rad=i%2===0?R:r;
    i===0?ctx.moveTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad)
         :ctx.lineTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad);
  }
  ctx.closePath();
  ctx.fillStyle=fill; ctx.fill();
  ctx.strokeStyle=stroke; ctx.lineWidth=2; ctx.stroke();
}

// ─── Win overlay ───
function drawWinOverlay(t){
  winAlpha+=(winTarget-winAlpha)*.04;
  if(winAlpha<.01) return;
  ctx.save();

  // 半透明背景遮罩（轻薄）
  ctx.globalAlpha=winAlpha*.55;
  ctx.fillStyle='rgba(2,6,23,.7)'; ctx.fillRect(0,0,CW,CH);
  ctx.globalAlpha=winAlpha;

  const pcx=CW/2, pcy=CH/2;
  const px=pcx-PANEL_W/2, py=pcy-PANEL_H/2;

  // 面板卡片
  ctx.beginPath(); rr(px,py,PANEL_W,PANEL_H,PANEL_R);
  ctx.fillStyle='rgba(8,14,36,.96)'; ctx.fill();
  ctx.strokeStyle='rgba(99,132,200,.35)'; ctx.lineWidth=1.5; ctx.stroke();

  // 旋转光芒（小，仅在标题区域）
  ctx.save(); ctx.beginPath(); rr(px,py,PANEL_W,PANEL_H,PANEL_R); ctx.clip();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2+t*.35;
    ctx.beginPath(); ctx.moveTo(pcx,pcy-28);
    ctx.lineTo(pcx+Math.cos(a)*80,pcy-28+Math.sin(a)*80);
    ctx.strokeStyle=`hsla(${48+i*22},85%,65%,.12)`;
    ctx.lineWidth=2; ctx.stroke();
  }
  ctx.restore();

  // 标题
  ctx.font='bold 30px "Segoe UI",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const wg=ctx.createLinearGradient(pcx-80,0,pcx+80,0);
  wg.addColorStop(0,'#fbbf24'); wg.addColorStop(.5,'#facc15'); wg.addColorStop(1,'#fbbf24');
  ctx.fillStyle=wg;
  ctx.shadowColor='rgba(250,204,21,.4)'; ctx.shadowBlur=12;
  ctx.fillText('🎉 排序完成！',pcx,py+36);
  ctx.shadowBlur=0;

  // 副标题
  ctx.font='12px "Segoe UI",sans-serif';
  ctx.fillStyle='rgba(148,163,184,.85)';
  ctx.fillText(winMsg, pcx, py+64);

  if(mode==='play'){
    // 星星
    const starY=py+110, starR=18, gap=52;
    const msgs=['再接再厉！','不错哦！','完美！'];
    for(let i=0;i<3;i++){
      const sx=pcx+(i-1)*gap, filled=i<winStars;
      if(filled){ ctx.shadowColor='#fbbf24'; ctx.shadowBlur=14; }
      drawStar(sx,starY,starR,filled?'#facc15':'#1e293b',filled?'#fbbf24':'#2d3a50');
      ctx.shadowBlur=0;
    }
    ctx.font='bold 14px "Segoe UI",sans-serif';
    ctx.fillStyle=winStars===3?'#facc15':winStars===2?'#38bdf8':'#94a3b8';
    ctx.fillText(msgs[winStars-1]??'',pcx,starY+starR+18);
  } else {
    // 数据格
    const labs=['比较','交换','轮次'], vals=[String(stats.c),String(stats.s),String(stats.p)];
    const bw=80, bh=44, bgap=(PANEL_W-bw*3)/4;
    for(let i=0;i<3;i++){
      const bx=px+bgap+(bw+bgap)*i, by2=py+82;
      ctx.beginPath(); rr(bx,by2,bw,bh,8);
      ctx.fillStyle='rgba(13,17,32,.9)'; ctx.fill();
      ctx.strokeStyle='#1e293b'; ctx.lineWidth=1; ctx.stroke();
      ctx.font='bold 18px "Segoe UI",sans-serif';
      ctx.fillStyle='#38bdf8'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(vals[i],bx+bw/2,by2+18);
      ctx.font='10px "Segoe UI",sans-serif';
      ctx.fillStyle='#334155'; ctx.fillText(labs[i].toUpperCase(),bx+bw/2,by2+34);
    }
  }

  // 底部提示
  ctx.font='11px "Segoe UI",sans-serif';
  ctx.fillStyle='rgba(99,102,241,.7)'; ctx.textAlign='center';
  ctx.fillText('点击「重置」再来一局',pcx,py+PANEL_H-14);

  // ── 关闭按钮（醒目红色）──
  const bx=CLOSE_BTN.x, by=CLOSE_BTN.y, br=CLOSE_BTN.r;
  ctx.shadowColor='rgba(239,68,68,.6)'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2);
  ctx.fillStyle='#dc2626'; ctx.fill();
  ctx.strokeStyle='#fca5a5'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.shadowBlur=0;
  ctx.font='bold 17px "Segoe UI",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ffffff';
  ctx.fillText('×',bx,by+1);

  ctx.restore();
}

// ═══════════════════════════════════════════════
// SORT GENERATOR
// ═══════════════════════════════════════════════
function* sortGen(a){
  const n=a.length, srt=new Set();
  for(let pass=0;pass<n-1;pass++){
    for(let i=0;i<n-1-pass;i++){
      yield{t:'cmp',i,j:i+1};
      if(a[i]>a[i+1]){ [a[i],a[i+1]]=[a[i+1],a[i]]; yield{t:'swp',i,j:i+1}; }
    }
    srt.add(n-1-pass);
    yield{t:'pass',p:pass+1,srt:new Set(srt)};
  }
  yield{t:'done'};
}

// ═══════════════════════════════════════════════
// STEP
// ═══════════════════════════════════════════════
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function doStep(){
  if(!gen||gameDone) return;
  const {value:v,done:gd}=gen.next();
  if(gd) return;

  if(v.t==='cmp'){
    stats.c++; updateStatEls();
    // 若是本轮第一次比较，插入进行中条目
    const last=passLog[passLog.length-1];
    if(!last || last.maxVal!==null){ passLog.push({p:curPass,cmps:0,maxVal:null}); passTxt=`第 ${curPass} 轮`; }
    passLog[passLog.length-1].cmps++;
    const bi=posBubs[v.i], bj=posBubs[v.j];
    bi.state='comparing'; bj.state='comparing';
    comparing=[v.i,v.j];
    sfx.cmp(arr[v.i],N);
    const bobi=Math.sin(gameT*1.75+bi.bobPhase)*5.5;
    const bobj=Math.sin(gameT*1.75+bj.bobPhase)*5.5;
    spawnCmpParts(bi.x,SWIM_Y+bi.yOff+bobi,bj.x,SWIM_Y+bj.yOff+bobj);
    await sleep(360);
    bi.state='idle'; bj.state='idle';
    // comparing 保留，直到下一次 cmp/swp/pass/done 再清除

  } else if(v.t==='swp'){
    stats.s++; updateStatEls();
    sfx.swp(arr[v.i],arr[v.j],N);
    const bi=posBubs[v.i], bj=posBubs[v.j];
    bi.state='swapping'; bj.state='swapping';
    bi.fastLerp=true; bj.fastLerp=true;
    bi.targetYOff=0; bj.targetYOff=0;
    bi.targetX=positions[v.j]; bj.targetX=positions[v.i];
    swapping=[v.i,v.j];
    [posBubs[v.i],posBubs[v.j]]=[posBubs[v.j],posBubs[v.i]];
    await sleep(680);
    swapping=[];
    posBubs[v.i].targetYOff=0; posBubs[v.j].targetYOff=0;
    posBubs[v.i].state='idle'; posBubs[v.j].state='idle';
    posBubs[v.i].fastLerp=false; posBubs[v.j].fastLerp=false;

  } else if(v.t==='pass'){
    comparing=[];
    // 补全本轮条目的最大值
    if(passLog.length>0) passLog[passLog.length-1].maxVal=arr[arr.length-v.p];
    curPass=v.p+1;
    stats.p=v.p; updateStatEls();
    v.srt.forEach(x=>{ srtSet.add(x); posBubs[x].state='sorted';
      posBubs[x].targetYOff=-95;
      spawnSparks(posBubs[x].x, SWIM_Y+posBubs[x].yOff, posBubs[x].hue);
      sfx.pop();
    });
    passTxt=`第 ${v.p} 轮`;

  } else if(v.t==='done'){
    comparing=[];
    for(let i=0;i<arr.length;i++){ srtSet.add(i); posBubs[i].state='sorted'; posBubs[i].targetYOff=-95; }
    await finishGame();
  }
}

function updateStatEls(){}

// ─── Timer ───
function startClock(){ t0=Date.now(); timerID=setInterval(()=>{ },100); }
function stopClock(){ clearInterval(timerID); }

// ─── Finish ───
async function finishGame(){
  gameDone=true; running=false; stopClock(); setBtns(true,false);
  // pop wave
  for(let i=0;i<posBubs.length;i++){
    setTimeout(()=>{
      const b=posBubs[i];
      b.targetYOff=-65; sfx.pop();
      spawnSparks(b.x,SWIM_Y+b.yOff,b.hue);
      setTimeout(()=>{ b.targetYOff=0; },420);
    },i*90);
  }
  await sleep(500);
  sfx.win();
  winElapsed = t0 ? (Date.now()-t0)/1000 : 0;
  const tStr=`${String(Math.floor(winElapsed/60)).padStart(2,'0')}:${String(Math.floor(winElapsed%60)).padStart(2,'0')}.${Math.floor((winElapsed%1)*10)}`;
  if(mode==='play'){
    winStars = playOps<=minOps ? 3 : playOps<=minOps+Math.ceil(minOps*.5) ? 2 : 1;
    winMsg=`操作 ${playOps} 次（最少 ${minOps} 次）  用时 ${tStr}`;
  } else {
    winStars=0;
    winMsg=`共 ${stats.p} 轮  ${stats.c} 次比较  用时 ${tStr}`;
  }
  passTxt='🎉 排序完成';
  setTimeout(()=>{ winTarget=1; },700);
}

// ─── Auto run ───
function getDelay(){ const v=+document.getElementById('spd').value; return Math.round(1500-(v-1)*(1430/9)); }
async function autoRun(){
  if(running||gameDone) return;
  running=true; if(!t0) startClock();
  document.getElementById('btn-auto').textContent='⏸ 暂停';
  setBtns(false,true);
  while(running&&!gameDone){ await doStep(); if(gameDone) break; await sleep(getDelay()); }
  if(!gameDone){ running=false; document.getElementById('btn-auto').textContent='▶ 自动排序'; setBtns(false,false); }
}
function setBtns(done,isRunning){
  document.getElementById('btn-auto').disabled=done||(mode==='play');
  document.getElementById('btn-step').disabled=done||isRunning||(mode==='play');
}

// ═══════════════════════════════════════════════
// PLAY MODE
// ═══════════════════════════════════════════════
function getClickedBub(mx,my){
  const rect=cv.getBoundingClientRect();
  const cx=(mx-rect.left)*(CW/rect.width);
  const cy=(my-rect.top)*(CH/rect.height);
  for(let i=0;i<posBubs.length;i++){
    const b=posBubs[i];
    const bob=Math.sin(gameT*1.75+b.bobPhase)*5.5;
    const fy=SWIM_Y+b.yOff+bob;
    if(Math.hypot(cx-b.x,cy-fy)<b.r*1.3) return i;
  }
  return -1;
}

cv.addEventListener('click',e=>{
  // 结算面板关闭按钮
  if(winAlpha>0.5){
    const rect=cv.getBoundingClientRect();
    const scaleX=CW/rect.width, scaleY=CH/rect.height;
    const cx=(e.clientX-rect.left)*scaleX, cy=(e.clientY-rect.top)*scaleY;
    if(Math.hypot(cx-CLOSE_BTN.x,cy-CLOSE_BTN.y)<CLOSE_BTN.r+4){
      winTarget=0;
    }
    return;
  }
  if(mode!=='play'||gameDone) return;
  resumeAC();
  const idx=getClickedBub(e.clientX,e.clientY);
  if(idx===-1) return;
  const hint=document.getElementById('hint');
  if(!t0) startClock();

  if(selIdx===-1){
    selIdx=idx; sfx.click();
    hint.textContent=`已选中 ${posBubs[idx].value} 号泡泡，点击相邻泡泡交换`; hint.className='ok';
  } else if(selIdx===idx){
    selIdx=-1; sfx.click(); hint.textContent='点击任意泡泡选择'; hint.className='';
  } else if(Math.abs(selIdx-idx)===1){
    const a=Math.min(selIdx,idx),b=a+1;
    stats.c++; stats.s++; playOps++; updateStatEls();

    // ── 先短暂显示比较弧（200ms），再触发交换 ──
    const fa=posBubs[a],fb=posBubs[b];
    fa.state='comparing'; fb.state='comparing';
    comparing=[a,b];
    const bobi=Math.sin(gameT*1.75+fa.bobPhase)*5.5;
    const bobj=Math.sin(gameT*1.75+fb.bobPhase)*5.5;
    spawnCmpParts(fa.x,SWIM_Y+fa.yOff+bobi, fb.x,SWIM_Y+fb.yOff+bobj);
    sfx.cmp(arr[a],N);

    setTimeout(()=>{
      sfx.swp(arr[a],arr[b],N);
      [arr[a],arr[b]]=[arr[b],arr[a]];
      fa.state='swapping'; fb.state='swapping';
      fa.fastLerp=true; fb.fastLerp=true;
      fa.targetYOff=0; fb.targetYOff=0;
      fa.targetX=positions[b]; fb.targetX=positions[a];
      swapping=[a,b];
      [posBubs[a],posBubs[b]]=[posBubs[b],posBubs[a]];
      selIdx=-1; hint.textContent='✓ 交换！'; hint.className='ok';

      setTimeout(()=>{
        comparing=[]; swapping=[];
        posBubs[a].targetYOff=0; posBubs[b].targetYOff=0;
        posBubs[a].state='idle'; posBubs[b].state='idle';
        posBubs[a].fastLerp=false; posBubs[b].fastLerp=false;
        checkPartialSort();
        if(isSorted()){
          for(let i=0;i<arr.length;i++){
            if(!srtSet.has(i)){ srtSet.add(i); posBubs[i].state='sorted'; posBubs[i].targetYOff=-95; }
          }
          finishGame();
        } else{ hint.textContent='点击任意泡泡选择'; hint.className=''; }
      },700);
    },220);
  } else{
    sfx.err(); hint.textContent='只能交换相邻泡泡！'; hint.className='err';
    selIdx=-1;
    setTimeout(()=>{hint.textContent='点击任意泡泡选择';hint.className='';},1200);
  }
});

function isSorted(){ for(let i=0;i<arr.length-1;i++) if(arr[i]>arr[i+1]) return false; return true; }

// 挑战模式：从右往左检测连续就位泡泡（arr[i]===i+1 且右侧全对）
function checkPartialSort(){
  let allRight=true;
  for(let i=arr.length-1;i>=0;i--){
    if(allRight && arr[i]===i+1){
      if(!srtSet.has(i)){
        srtSet.add(i);
        posBubs[i].state='sorted';
        posBubs[i].targetYOff=-95;
        spawnSparks(posBubs[i].x, SWIM_Y+posBubs[i].yOff, posBubs[i].hue);
        sfx.pop();
        stats.p=arr.length-i;
        updateStatEls();
      }
    } else {
      allRight=false;
      if(srtSet.has(i)){ srtSet.delete(i); posBubs[i].state='idle'; posBubs[i].targetYOff=0; }
    }
  }
}

// ═══════════════════════════════════════════════
// RESET
// ═══════════════════════════════════════════════
function reset(){
  running=false; gameDone=false; stats={c:0,s:0,p:0};
  srtSet.clear(); selIdx=-1; t0=null; stopClock();
  winAlpha=0; winTarget=0; winElapsed=0; cmpParts=[]; sparks=[]; comparing=[]; swapping=[];
  passTxt='准备开始';
  passLog=[]; curPass=1;
  document.getElementById('hint').textContent=mode==='play'?'点击任意泡泡选择':'';
  document.getElementById('hint').className='';
  document.getElementById('btn-auto').textContent='▶ 自动排序';
  setBtns(false,false);
  cv.className=mode==='play'?'playable':'';

  arr=Array.from({length:N},(_,i)=>i+1);
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  // 计算最少相邻交换次数 = 初始逆序对数
  minOps=0;
  for(let i=0;i<arr.length;i++) for(let j=i+1;j<arr.length;j++) if(arr[i]>arr[j]) minOps++;
  playOps=0; winStars=0;
  initBubs(); gen=sortGen(arr);
}

// ═══════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════
document.getElementById('btn-auto').addEventListener('click',()=>{ resumeAC(); if(mode==='play') return; if(running){running=false;}else autoRun(); });
document.getElementById('btn-step').addEventListener('click',()=>{ resumeAC(); if(mode==='play'||running) return; if(!t0) startClock(); doStep(); });
document.getElementById('btn-rst').addEventListener('click',()=>{ resumeAC(); sfx.click(); reset(); });
document.getElementById('t-watch').addEventListener('click',()=>{ if(mode==='watch') return; mode='watch'; document.getElementById('t-watch').classList.add('on'); document.getElementById('t-play').classList.remove('on'); resumeAC(); sfx.click(); reset(); });
document.getElementById('t-play').addEventListener('click',()=>{ if(mode==='play') return; mode='play'; document.getElementById('t-play').classList.add('on'); document.getElementById('t-watch').classList.remove('on'); resumeAC(); sfx.click(); reset(); });
document.getElementById('spd').addEventListener('input',e=>{ document.getElementById('spd-lbl').textContent=e.target.value; });
document.querySelectorAll('.sz').forEach(btn=>{
  btn.addEventListener('click',()=>{ document.querySelectorAll('.sz').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); N=+btn.dataset.n; resumeAC(); sfx.click(); reset(); });
});

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
reset();
requestAnimationFrame(ts=>{ lastTs=ts; requestAnimationFrame(render); });
</script>
